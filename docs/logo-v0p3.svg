<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Abstract cloud-spirit mark: continuous line forming cloud arch + inner spark -->

  <!-- Outer cloud arc (left) -->
  <path d="M 130 200 Q 110 170 130 150 Q 140 120 170 115 Q 190 100 210 115 Q 240 100 260 115 Q 290 110 295 140 Q 315 155 310 185 Q 320 210 295 215"
        fill="none" stroke="url(#strokeGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Inner abstract spark (diamond + cross) -->
  <g transform="translate(225, 155)">
    <!-- Diamond -->
    <path d="M 0 -25 L 18 0 L 0 25 L -18 0 Z"
          fill="none" stroke="url(#strokeGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Horizontal line -->
    <line x1="-18" y1="0" x2="18" y2="0" stroke="url(#strokeGrad)" stroke-width="2" stroke-linecap="round"/>
    <!-- Vertical line -->
    <line x1="0" y1="-25" x2="0" y2="25" stroke="url(#strokeGrad)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Small accent dots -->
  <circle cx="130" cy="150" r="3" fill="#3b82f6"/>
  <circle cx="310" cy="185" r="3" fill="#8b5cf6"/>

  <!-- Text -->
  <text x="225" y="290" text-anchor="middle" font-family="'Helvetica Neue','Segoe UI',Arial,sans-serif" font-size="36" font-weight="300" letter-spacing="12" fill="#1e3a5f">CLOUD SOUL</text>
  <text x="225" y="318" text-anchor="middle" font-family="'Helvetica Neue','Segoe UI',Arial,sans-serif" font-size="12" font-weight="300" letter-spacing="6" fill="#8ba0b8">AI AGENT RUNTIME</text>

  <!-- Subtle separator line -->
  <line x1="140" y1="335" x2="310" y2="335" stroke="#d0dce8" stroke-width="1"/>
</svg>