<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#a0e0ff"/>
      <stop offset="70%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="60%" stop-color="#c8e4ff"/>
      <stop offset="100%" stop-color="#a0c8f0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cloud body -->
  <g transform="translate(60, 50)">
    <ellipse cx="120" cy="130" rx="65" ry="25" fill="url(#cloudGrad)" opacity="0.9"/>
    <ellipse cx="160" cy="115" rx="55" ry="30" fill="url(#cloudGrad)" opacity="0.9"/>
    <ellipse cx="195" cy="130" rx="50" ry="22" fill="url(#cloudGrad)" opacity="0.9"/>
    <ellipse cx="135" cy="125" rx="80" ry="28" fill="url(#cloudGrad)" opacity="0.95"/>
    <rect x="55" y="125" width="140" height="15" fill="url(#cloudGrad)" opacity="0.9" rx="3"/>
  </g>

  <!-- Core soul glow -->
  <g filter="url(#glow)">
    <circle cx="225" cy="170" r="35" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.5">
      <animate attributeName="r" values="35;38;35" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.3;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="225" cy="170" r="18" fill="url(#coreGlow)" opacity="0.9">
      <animate attributeName="r" values="18;20;18" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="225" cy="170" r="8" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- Text -->
  <text x="225" y="290" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="38" font-weight="700" letter-spacing="8" fill="#1e3a5f">CLOUD SOUL</text>
  <text x="225" y="315" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="400" letter-spacing="4" fill="#6b8db5">AI AGENT RUNTIME</text>
</svg>