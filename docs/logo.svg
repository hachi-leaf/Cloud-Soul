<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="500" height="400">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#a0e0ff"/>
      <stop offset="70%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f4ff"/>
      <stop offset="60%" stop-color="#c8e4ff"/>
      <stop offset="100%" stop-color="#a0c8f0"/>
    </linearGradient>
    <linearGradient id="connGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="225" cy="170" r="155" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.15"/>

  <!-- Multi-terminal connection dots -->
  <circle cx="50" cy="280" r="4" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="400" cy="290" r="4" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="60" cy="80" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="390" cy="70" r="3" fill="#8b5cf6" opacity="0.4"/>

  <line x1="50" y1="280" x2="140" y2="220" stroke="url(#connGrad)" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
  <line x1="400" y1="290" x2="310" y2="225" stroke="url(#connGrad)" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
  <line x1="60" y1="80" x2="130" y2="130" stroke="url(#connGrad)" stroke-width="1" opacity="0.2" stroke-dasharray="4,6"/>
  <line x1="390" y1="70" x2="320" y2="120" stroke="url(#connGrad)" stroke-width="1" opacity="0.2" stroke-dasharray="4,6"/>

  <!-- Cloud body -->
  <g transform="translate(60, 50)">
    <ellipse cx="120" cy="130" rx="65" ry="25" fill="url(#cloudGrad)" opacity="0.9"/>
    <ellipse cx="160" cy="115" rx="55" ry="30" fill="url(#cloudGrad)" opacity="0.9"/>
    <ellipse cx="195" cy="130" rx="50" ry="22" fill="url(#cloudGrad)" opacity="0.9"/>
    <ellipse cx="135" cy="125" rx="80" ry="28" fill="url(#cloudGrad)" opacity="0.95"/>
    <rect x="55" y="125" width="140" height="15" fill="url(#cloudGrad)" opacity="0.9" rx="3"/>
  </g>

  <!-- Core soul glow -->
  <g filter="url(#glow)">
    <circle cx="225" cy="170" r="35" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.5">
      <animate attributeName="r" values="35;38;35" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.3;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="225" cy="170" r="18" fill="url(#coreGlow)" opacity="0.9">
      <animate attributeName="r" values="18;20;18" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="225" cy="170" r="8" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- Orbiting nodes (ROS2) -->
  <g filter="url(#softGlow)">
    <circle cx="190" cy="145" r="2.5" fill="#93c5fd" opacity="0.7">
      <animate attributeName="cx" values="190;255;190" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="145;150;145" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="148" r="2" fill="#93c5fd" opacity="0.6">
      <animate attributeName="cx" values="260;195;260" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="148;195;148" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="225" cy="135" r="2" fill="#a5b4fc" opacity="0.5">
      <animate attributeName="cx" values="225;260;225" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="135;145;135" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Text -->
  <text x="225" y="280" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="38" font-weight="700" letter-spacing="8" fill="#1e3a5f">CLOUD SOUL</text>
  <text x="225" y="305" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="400" letter-spacing="4" fill="#6b8db5">AI AGENT RUNTIME</text>

  <!-- Bottom bar -->
  <g transform="translate(135, 325)">
    <rect x="0" y="0" width="180" height="1.5" rx="1" fill="#3b82f6" opacity="0.3"/>
    <circle cx="0" cy="0.75" r="2" fill="#3b82f6" opacity="0.5"/>
    <circle cx="90" cy="0.75" r="2" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="180" cy="0.75" r="2" fill="#3b82f6" opacity="0.5"/>
  </g>
</svg>