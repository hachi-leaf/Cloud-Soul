<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{agent_name} - Cloud-Soul</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<style>
:root {
  --blue: #4d6bfe;
  --blue-light: #eef1ff;
  --bg: #f2f3f7;
  --surface: #fff;
  --text: #1f2328;
  --text-secondary: #656d76;
  --text-tertiary: #8b949e;
  --border: #d0d7de;
  --code-bg: #f6f8fa;
  --radius: 16px;
}
.dark {
  --blue: #6b8afd;
  --blue-light: #1c2333;
  --bg: #0d1117;
  --surface: #161b22;
  --text: #e6edf3;
  --text-secondary: #8b949e;
  --text-tertiary: #6e7681;
  --border: #30363d;
  --code-bg: #0d1117;
}

* { margin:0;padding:0;box-sizing:border-box; }
body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
  transition: background .3s, color .3s;
}

/* header */
.hdr {
  display: flex; align-items: center; gap: 10px; padding: 0 20px; height: 52px;
  background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.hdr .logo { font-size: 20px; }
.hdr .name { font-size: 14px; font-weight: 600; }
.hdr .right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
.hdr .right button {
  width: 30px; height: 30px; border-radius: 6px; border: none; background: transparent;
  color: var(--text-secondary); cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center;
}
.hdr .right button:hover { background: var(--bg); }

/* messages */
.msgs { flex:1; overflow-y:auto; }
.msgs-inner { max-width: 768px; margin:0 auto; padding: 20px 24px 40px; display:flex; flex-direction:column; gap: 28px; }

.msg { display:flex; gap:12px; animation: in .25s ease; }
.msg.ai { flex-direction:row; }
.msg.hu { flex-direction:row-reverse; }

.msg .av {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:14px;
  background: var(--blue-light); color: var(--blue); margin-top: 2px;
}
.msg.hu .av { background: var(--blue); color: #fff; }

.msg .wrap { display:flex; flex-direction:column; gap:4px; max-width:100%; }
.msg.hu .wrap { align-items:flex-end; }

.msg .time { font-size:11px; color: var(--text-tertiary); padding: 0 2px; }

/* ai bubble: no bg, no border - like deepseek */
.msg.ai .bub {
  padding: 0; line-height: 1.75; font-size: 14px; word-break: break-word;
}
.msg.hu .bub {
  padding: 8px 16px; border-radius: var(--radius); background: var(--blue); color: #fff;
  font-size: 14px; line-height: 1.6; word-break: break-word;
}

/* welcome */
.welc { text-align: center; padding: 80px 20px; }
.welc .ico { font-size: 48px; margin-bottom: 12px; }
.welc h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.welc p { font-size: 14px; color: var(--text-tertiary); }

/* markdown */
.bub p { margin: 8px 0; }
.bub h1 { font-size: 18px; margin: 18px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.bub h2 { font-size: 16px; margin: 16px 0 8px; }
.bub h3 { font-size: 14px; margin: 14px 0 6px; }
.bub ul,.bub ol { padding-left: 22px; margin: 8px 0; }
.bub li { margin: 3px 0; }
.bub blockquote {
  border-left: 3px solid var(--blue); padding: 6px 14px; margin: 10px 0;
  background: var(--bg); border-radius: 0 8px 8px 0; color: var(--text-secondary);
}
.bub table { border-collapse: collapse; margin: 8px 0; width: 100%; display: block; overflow-x: auto; }
.bub th,.bub td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
.bub th { background: var(--bg); font-weight: 600; }
.bub hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.bub a { color: var(--blue); }
.bub :not(pre)>code {
  background: var(--blue-light); color: var(--blue);
  padding: 2px 6px; border-radius: 4px; font-size: 13px;
  font-family: "JetBrains Mono","Fira Code",monospace;
}
.bub pre {
  background: var(--code-bg); border-radius: 10px; padding: 16px;
  overflow-x: auto; margin: 10px 0; position: relative;
  border: 1px solid var(--border);
}
.bub pre code { font-family: "JetBrains Mono","Fira Code",monospace; font-size: 13px; line-height: 1.6; }
.bub .cpy {
  position: absolute; top: 8px; right: 8px; padding: 4px 10px;
  background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer; font-size: 11px; opacity: 0; transition: .2s;
}
.bub pre:hover .cpy { opacity: 1; }
.bub .cpy.done { background: #4caf50; color: #fff; border-color: #4caf50; }

/* input */
.inp { padding: 0 24px 20px; flex-shrink: 0; }
.inp .wrap2 {
  max-width: 768px; margin: 0 auto; display: flex; align-items: flex-end;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: 0 2px 8px rgba(0,0,0,0.04); padding: 4px 6px 4px 4px;
}
.dark .inp .wrap2 { box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.inp textarea {
  flex: 1; padding: 10px 11px; border: none; background: transparent;
  color: var(--text); font-family: inherit; font-size: 14px; outline: none;
  resize: none; min-height: 36px; max-height: 160px; line-height: 1.5;
}
.inp .sbtn {
  padding: 8px 20px; background: var(--blue); color: #fff; border: none;
  border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500;
  white-space: nowrap; height: 34px;
}
.inp .sbtn:hover { opacity: .9; }
.inp .sbtn:disabled { opacity: .4; cursor: not-allowed; }

#st { font-size: 11px; color: var(--text-tertiary); text-align: center; padding: 4px 0 0; }

.msgs::-webkit-scrollbar { width: 5px; }
.msgs::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
.dark .msgs::-webkit-scrollbar-thumb { background: #30363d; }

@keyframes in { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
</style>
<link rel="stylesheet" id="hl" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="hdr">
  <div class="logo">🤖</div>
  <div class="name">{agent_name}</div>
  <div class="right">
    <button id="thm" title="主题">🌓</button>
  </div>
</div>

<div class="msgs" id="ms">
  <div class="msgs-inner" id="mi">
    <div class="welc" id="w">
      <div class="ico">👋</div>
      <h2>你好，我是 {agent_name}</h2>
      <p>在下方输入消息，开始对话</p>
    </div>
  </div>
</div>
<div id="st">已连接</div>
<div class="inp">
  <div class="wrap2">
    <textarea id="ti" placeholder="输入消息..." rows="1"></textarea>
    <button class="sbtn" id="sb">发送</button>
  </div>
</div>

<script>
const bd=document.body,thm=document.getElementById('thm'),hl=document.getElementById('hl');
const s=localStorage.getItem('theme')||'light';
if(s==='dark'){bd.classList.add('dark');hl.href='https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';}
thm.textContent=s==='dark'?'☀️':'🌙';
thm.onclick=()=>{
  const d=bd.classList.toggle('dark');
  localStorage.setItem('theme',d?'dark':'light');
  hl.href=d?'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css':'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
  thm.textContent=d?'☀️':'🌙';
};

marked.setOptions({breaks:true,gfm:true});
function rd(t){return marked.parse(t);}

function hc(el){
  el.querySelectorAll('pre code').forEach(b=>{
    hljs.highlightElement(b);
    const p=b.parentElement;
    if(p.querySelector('.cpy'))return;
    const btn=document.createElement('button');
    btn.className='cpy';btn.textContent='复制';
    btn.onclick=()=>{
      navigator.clipboard.writeText(b.textContent).then(()=>{
        btn.textContent='已复制';btn.classList.add('done');
        setTimeout(()=>{btn.textContent='复制';btn.classList.remove('done');},2000);
      });
    };
    p.appendChild(btn);
  });
}

const mi=document.getElementById('mi'),ti=document.getElementById('ti'),sb=document.getElementById('sb'),st=document.getElementById('st');
let wr=false;

function rw(){
  if(wr)return;
  const w=document.getElementById('w');if(w)w.remove();wr=true;
}

function am(text,role){
  rw();
  const d=document.createElement('div');d.className='msg '+(role==='user'?'hu':'ai');
  const n=new Date();
  const ts=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  const av=role==='user'?'👤':'🤖';
  const html=role==='user'?text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):rd(text);
  d.innerHTML='<div class="av">'+av+'</div><div class="wrap"><div class="bub">'+html+'</div><div class="time">'+ts+'</div></div>';
  mi.appendChild(d);
  if(role==='agent')hc(d);
  document.getElementById('ms').scrollTop=document.getElementById('ms').scrollHeight;
}

ti.addEventListener('input',()=>{ti.style.height='auto';ti.style.height=Math.min(ti.scrollHeight,160)+'px';});

async function sm(){
  const t=ti.value.trim();if(!t)return;
  am(t,'user');ti.value='';ti.style.height='auto';st.textContent='发送中...';sb.disabled=true;
  try{
    const r=await fetch('/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t})});
    const d=await r.json();st.textContent=d.success?'已发送':'失败: '+(d.error||'?');
  }catch(e){st.textContent='连接错误';}
  sb.disabled=false;
}
sb.onclick=sm;
ti.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sm();}});

const es=new EventSource('/stream');
es.onmessage=e=>{am(e.data,'agent');st.textContent='已连接';};
es.onerror=()=>{st.textContent='重连中...';};
</script>
</body>
</html>
