<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{agent_name}</title>
<style>
:root{--bg:#fff;--surface:#fff;--text:#0f1115;--text2:#61666b;--blue:#3964fe;--blue-light:#edf3fe;--border:#e1e5ee;--radius:30px}
.dark{--bg:#151517;--surface:#1b1b1c;--text:#f9fafb;--text2:#979da6;--blue:#5686fe;--blue-light:#2c2c2e;--border:#2c2c2e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column}
.msgs{flex:1;overflow-y:auto;padding:20px 0}
.msgs-inner{max-width:768px;margin:0 auto;padding:0 20px;display:flex;flex-direction:column;gap:12px}
.msg-row{display:flex;gap:8px}
.msg-row.user{flex-direction:row-reverse}
.ava{width:30px;height:30px;border-radius:50%;flex-shrink:0;overflow:hidden}
.ava img{width:100%;height:100%;object-fit:cover}
.bub{padding:10px 16px;border-radius:22px;font-size:16px;line-height:24px}
.msg-row.agent .ava{display:none}.msg-row.agent .bub{background:transparent;color:var(--text);max-width:100%;padding:10px 0}
.msg-row.user .bub{background:var(--blue-light);color:var(--text);max-width:calc(100% - 88px)}
.msg-body{flex:1;min-width:0;display:flex;flex-direction:column}
.msg-row.user .msg-body{align-items:flex-end}
.msg-row.agent .attaches{align-items:flex-start}
.msg-row.user .attaches{align-items:flex-end}
.bub p{margin:4px 0}.bub p:first-child{margin-top:0}.bub p:last-child{margin-bottom:0}
.bub pre{background:#fafafa;color:#0d0d0d;border-radius:12px;padding:16px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;margin:16px 0;font-family:Menlo,Monaco,Consolas,"Cascadia Mono","Ubuntu Mono","JetBrains Mono","Fira Code","Courier New","Noto Sans Mono CJK SC","Sarasa Mono SC","Source Han Mono SC","Microsoft YaHei","SimHei","PingFang SC",monospace;font-size:13px;line-height:22px}
.bub code{font-family:Menlo,Monaco,Consolas,"Cascadia Mono","Ubuntu Mono","JetBrains Mono","Fira Code","Courier New",monospace;font-size:13px}
.bub pre code{background:none;padding:0;color:inherit;font-family:inherit!important;font-size:13px;line-height:22px}
.bub ul,.bub ol{margin:4px 0;padding-left:20px}
.bub table{border-collapse:collapse;margin:8px 0;width:100%;font-size:13px}
.bub th,.bub td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.bub th{background:var(--surface);font-weight:600}
.bub blockquote{border-left:2px solid var(--text2);padding-left:14px;margin:16px 0 0;color:var(--text2)}
.bub a{color:var(--blue);text-decoration:none}
.attaches{display:flex;flex-direction:column;gap:6px;margin-top:6px;width:100%;overflow:visible}
.attaches .fchip{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:22px;background:var(--surface);border:1px solid var(--border);margin-top:6px;width:336px;max-width:100%;box-sizing:border-box;min-height:44px}
.attaches .fc{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1;overflow:hidden}
.attaches .fn{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.attaches .fs{font-size:11px;color:var(--text2);white-space:nowrap}
.time{font-size:11px;color:var(--text2);margin-top:3px}
.msg-row.user .time{text-align:right}
.empty-hint{text-align:center;color:var(--text2);margin-top:60px;font-size:16px;display:flex;flex-direction:column;align-items:center;gap:12px}
.empty-hint .logo{font-size:48px}
.toggle{position:fixed;top:12px;right:16px;z-index:20;width:48px;height:48px;border:1px solid var(--border);background:var(--surface);border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.bottom{border-top:1px solid var(--border);padding:12px 0 16px;flex-shrink:0}
.bottom-inner{max-width:768px;margin:0 auto;padding:0 20px 0 14px}
.inp-bar{display:flex;align-items:flex-start;gap:8px;background:var(--surface);border:none;outline:1px solid var(--border);outline-offset:-1px;border-radius:var(--radius);padding:0;transition:outline-color .2s;position:relative}
.inp-bar:focus-within{outline:2px solid var(--blue);outline-offset:-2px}
.inp-bar textarea{flex:1;border:none;background:transparent;color:var(--text);font-size:16px;line-height:1.5;resize:none;outline:none;min-height:140px;max-height:400px;padding:16px 48px 60px 20px;font-family:inherit}
.inp-bar textarea::placeholder{color:var(--text2)}
.btn{display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text2);cursor:pointer;border-radius:8px;flex-shrink:0;font-size:18px}
.btn:hover{background:var(--border)}
#fb{width:48px;height:48px;border-radius:50%;position:absolute;right:58px;bottom:4px}
.btn.send-btn{color:#fff;border-radius:50%;position:absolute;right:6px;bottom:4px;width:48px;height:48px}
.btn.send-btn:not(:disabled){background:#3b66fe}
.btn.send-btn:hover:not(:disabled){opacity:.85}
.btn.send-btn:disabled{cursor:default;background:#b1c2fd}
.dark .btn.send-btn:not(:disabled){background:#5887fe}
.dark .btn.send-btn:disabled{background:#3e5281}
.up-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:0}
.up-chip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:10px 16px;font-size:13px;max-width:100%;min-height:48px}
.up-chip .c-name{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.up-chip .rm{cursor:pointer;color:var(--text2);margin-left:2px;font-weight:bold}
.up-chip .rm:hover{color:#e05555}
#st{text-align:center;font-size:12px;color:var(--text2);padding:2px 0 0;min-height:18px}
.msgs::-webkit-scrollbar{width:8px}
.msgs::-webkit-scrollbar-thumb{background:#444;border-radius:4px}
.msgs::before{content:'';position:sticky;top:-20px;display:block;height:130px;background:linear-gradient(to bottom,var(--bg) 50%,transparent 100%);z-index:5;flex-shrink:0}

.dark .bub pre{background:#1e1e1e;color:#e3eaf2}

/* Light mode syntax (DeepSeek-inspired) */
.bub .hljs-keyword,.bub .hljs-selector-tag{color:#cf222e}
.bub .hljs-built_in,.bub .hljs-type,.bub .hljs-params{color:#0550ae}
.bub .hljs-title,.bub .hljs-title.function_,.bub .hljs-function .hljs-title{color:#8250df}
.bub .hljs-string,.bub .hljs-addition,.bub .hljs-attr{color:#0a3069}
.bub .hljs-number,.bub .hljs-literal{color:#0550ae}
.bub .hljs-comment,.bub .hljs-quote,.bub .hljs-deletion,.bub .hljs-meta{color:#6e7781}
.bub .hljs-variable,.bub .hljs-template-variable{color:#953800}
.bub .hljs-regexp,.bub .hljs-selector-attr,.bub .hljs-selector-pseudo{color:#0a3069}
.bub .hljs-symbol,.bub .hljs-bullet,.bub .hljs-link{color:#0550ae}
.bub .hljs-section,.bub .hljs-strong{font-weight:700}
.bub .hljs-emphasis{font-style:italic}
/* Dark mode syntax (DeepSeek-inspired) */
.dark .bub .hljs-keyword,.dark .bub .hljs-selector-tag{color:#ff7b72}
.dark .bub .hljs-built_in,.dark .bub .hljs-type,.dark .bub .hljs-params{color:#79c0ff}
.dark .bub .hljs-title,.dark .bub .hljs-title.function_,.dark .bub .hljs-function .hljs-title{color:#d2a8ff}
.dark .bub .hljs-string,.dark .bub .hljs-addition,.dark .bub .hljs-attr{color:#a5d6ff}
.dark .bub .hljs-number,.dark .bub .hljs-literal{color:#79c0ff}
.dark .bub .hljs-comment,.dark .bub .hljs-quote,.dark .bub .hljs-deletion,.dark .bub .hljs-meta{color:#8b949e}
.dark .bub .hljs-variable,.dark .bub .hljs-template-variable{color:#ffa657}
.dark .bub .hljs-regexp,.dark .bub .hljs-selector-attr,.dark .bub .hljs-selector-pseudo{color:#a5d6ff}
.dark .bub .hljs-symbol,.dark .bub .hljs-bullet,.dark .bub .hljs-link{color:#79c0ff}
.dark .bub .hljs-section,.dark .bub .hljs-strong{font-weight:700}
.dark .bub .hljs-emphasis{font-style:italic}


.cb-banner{font-family:Menlo,Monaco,Consolas,"Cascadia Mono","Ubuntu Mono",monospace;background:#fafafa;color:#0d0d0d}
.cb-banner .cb-copy-btn{background:transparent!important;color:#61666b}
.cb-banner .cb-copy-btn:hover{background:#eceeee!important}
.wrap{background:#fafafa}

.dark .cb-banner{background:#2e2e2e;color:#9b9ea3}
.dark .cb-banner .cb-copy-btn{background:transparent!important;color:#9b9ea3}
.dark .cb-banner .cb-copy-btn:hover{background:rgba(255,255,255,.06)!important}
.dark .wrap{background:#2e2e2e}
</style>
</head>
<body>
<button class="toggle" onclick="td()" title="切换深色模式" id="darkBtn">🌙</button>
<div class="msgs" id="ms"><div class="msgs-inner" id="mi"><div class="empty-hint"><div class="logo">🤖</div><div>开始对话吧</div></div></div></div>
<div class="bottom">
  <div class="bottom-inner">
    <div class="up-bar" id="ub"></div>
    <div class="inp-bar">
      <textarea id="ti" rows="2" placeholder="输入消息... (Enter 发送, Alt+Enter 换行)"></textarea>
      <button class="btn" id="fb" title="上传文件"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
      <button class="btn send-btn" id="sb" title="发送" disabled>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div id="st">就绪</div>
  </div>
</div>
<input type="file" id="ff" multiple style="display:none">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><script>
const sb=document.getElementById('sb'),stt=document.getElementById('st'),ti=document.getElementById('ti'),ms=document.getElementById('ms'),mi=document.getElementById('mi'),ub=document.getElementById('ub'),ff=document.getElementById('ff'),fb=document.getElementById('fb');
sb.onclick=sm;

const H_URL=location.pathname.replace(/\/$/,'');
let selFiles=[],_lastSeq=0,_hasSent=false;
marked.setOptions({breaks:true,gfm:true});

const HAS_UA=new Image();HAS_UA.src=H_URL+'/config/avatar/user.png';HAS_UA.onerror=()=>{HAS_UA.ok=0;};HAS_UA.onload=()=>{HAS_UA.ok=1;};
const HAS_AA=new Image();HAS_AA.src=H_URL+'/config/avatar/agent.png';HAS_AA.onerror=()=>{HAS_AA.ok=0;};HAS_AA.onload=()=>{HAS_AA.ok=1;};
function avaHTML(role){const img=role==='user'?HAS_UA:HAS_AA;if(img.ok)return '<div class="ava"><img src="'+H_URL+'/config/avatar/'+role+'.png"></div>';return '';}

function wrapCodeBlocks(el){el.querySelectorAll('.bub pre').forEach(pre=>{if(pre.closest('.wrap'))return;const cl=pre.querySelector('code');const lang=(cl&&cl.className.match(/language-(\w+)/)||[])[1]||'';const wrap=document.createElement('div');wrap.className='wrap';wrap.style.cssText='border-radius:12px;overflow:hidden;margin:16px 0';const banner=document.createElement('div');banner.className='cb-banner';banner.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:9px 14px;font-size:13px;border-radius:12px 12px 0 0';const langSpan=document.createElement('span');langSpan.style.cssText='font-family:inherit;font-size:13px';langSpan.textContent=lang||'code';const copyIcon='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;flex-shrink:0"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
const checkIcon='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;flex-shrink:0"><polyline points="20 6 9 17 4 12"/></svg>';
const copyBtn=document.createElement('button');
copyBtn.innerHTML=copyIcon+'复制';
copyBtn.className='cb-copy-btn';copyBtn.style.cssText='display:inline-flex;align-items:center;cursor:pointer;border:none;font-size:12px;padding:4px 10px;border-radius:16px;transition:background .15s;font-family:"PingFang SC","Microsoft YaHei","SimHei",sans-serif';
// hover handled by CSS .cb-copy-btn:hover
copyBtn.onclick=()=>{const code=pre.querySelector('code')||pre;navigator.clipboard.writeText(code.textContent).then(()=>{copyBtn.innerHTML=checkIcon+'复制';setTimeout(()=>{copyBtn.innerHTML=copyIcon+'复制';},2000);});};
banner.appendChild(langSpan);banner.appendChild(copyBtn);wrap.appendChild(banner);pre.style.cssText='margin:0!important;border-radius:0 0 12px 12px;padding:16px;white-space:pre-wrap;word-break:break-all';pre.parentNode.insertBefore(wrap,pre);wrap.appendChild(pre);});}
function highlightCode(el){el.querySelectorAll('pre code').forEach(b=>{try{hljs.highlightElement(b)}catch(e){}});wrapCodeBlocks(el);}
function szf(sz){if(sz>=1048576)return(sz/1048576).toFixed(1)+'MB';if(sz>=1024)return(sz/1024).toFixed(1)+'KB';return sz+'B';}

function am(text,role,files){
  const ei=mi.querySelector('.empty-hint');if(ei)ei.remove();
  const row=document.createElement('div');row.className='msg-row '+role;
  if(files&&files.length)text=text.replace(/\n\[附件:.*\]$/,'');
  let html=marked.parse(text||''),filesHtml='';
  if(files&&files.length){files.forEach(f=>{const nm=(f.original_name||f.name||'file').replace(/</g,'&lt;');const sz=f.size_human||szf(f.size||0);filesHtml+='<div class="fchip"><div class="fc"><span class="fn">'+nm+'</span><span class="fs">'+sz+'</span></div></div>';});}
  const ts=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  row.innerHTML=avaHTML(role)+'<div class="msg-body"><div class="bub">'+html+'</div>'+(filesHtml?'<div class="attaches">'+filesHtml+'</div>':'')+'<div class="time">'+ts+'</div></div>';
  mi.appendChild(row);highlightCode(row);ms.scrollTop=ms.scrollHeight;
}

async function poll(){
  while(true){
    try{const r=await fetch(H_URL+'/poll?after='+_lastSeq);const d=await r.json();
    if(d.messages)d.messages.forEach(m=>{if(m.role==='user'&&_hasSent){_hasSent=false;return;}am(m.msg,m.role,m.files);});
    if(d.last_seq!==undefined)_lastSeq=d.last_seq;}catch(e){}
    await new Promise(r=>setTimeout(r,2000));
  }
}

async function init(){
  try{const r=await fetch(H_URL+'/history');const d=await r.json();if(d.messages)d.messages.forEach(m=>am(m.msg,m.role,m.files));if(d.last_seq!==undefined)_lastSeq=d.last_seq;}catch(e){}
  stt.textContent='就绪';poll();
}
init();

function ar(){const v=ti.value.trim();sb.disabled=!v&&selFiles.filter(f=>f.status==='ready').length===0;ti.style.height='auto';ti.style.height=Math.min(ti.scrollHeight,200)+'px';}
ti.addEventListener('input',ar);
ti.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&!e.altKey){e.preventDefault();sm();}if(e.key==='Enter'&&e.altKey){e.preventDefault();ti.value+='\n';ar();}});

async function sm(){
  const t=ti.value.trim(),ready=selFiles.filter(f=>f.status==='ready');
  if(!t&&ready.length===0)return;
  if(ready.length>0){stt.textContent='上传文件中...';sb.disabled=true;const ul=await uploadAll();if(!t){_hasSent=true;am('','user',ul);clearUploads();sb.disabled=false;stt.textContent='已上传 '+ul.length+' 个文件';return;}}
  _hasSent=true;const done=selFiles.filter(f=>f.status==='done').map(f=>f.info);
  am(t,'user',done);ti.value='';ar();clearUploads();stt.textContent='发送中...';sb.disabled=true;
  try{const r=await fetch(H_URL+'/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t,files:done})});const d=await r.json();stt.textContent=d.success?'已发送':'失败: '+(d.error||'?');}catch(e){stt.textContent='连接错误';}
  sb.disabled=false;
}

function renderUpbar(){
  let h='';selFiles.forEach((f,i)=>{const sz=szf(f.file.size);const cls=f.status==='err'?' style="color:#e05555"':'';h+='<div class="up-chip"><span class="c-name" title="'+f.file.name.replace(/"/g,'&quot;')+'">'+f.file.name.replace(/</g,'&lt;')+'</span><span>'+sz+'</span><span class="rm" onclick="selFiles.splice('+i+',1);renderUpbar();ar()">x</span></div>';});
  ub.innerHTML=h;
}
async function uploadAll(){
  const ready=selFiles.filter(f=>f.status==='ready');if(!ready.length)return[];
  ready.forEach(r=>r.status='uploading');renderUpbar();const fd=new FormData();ready.forEach(r=>fd.append('files',r.file));
  try{const r=await fetch(H_URL+'/upload',{method:'POST',body:fd});const d=await r.json();if(d.success&&d.files)d.files.forEach((f,i)=>{if(f.error)ready[i].status='err';else{ready[i].status='done';ready[i].info=f;}});}catch(e){ready.forEach(r=>r.status='err');}
  renderUpbar();return selFiles.filter(f=>f.status==='done').map(f=>f.info);
}
function clearUploads(){selFiles=selFiles.filter(f=>f.status!=='done');renderUpbar();}

fb.onclick=()=>ff.click();
ff.onchange=()=>{for(const f of ff.files){if(!selFiles.some(sf=>sf.file.name===f.name&&sf.file.size===f.size))selFiles.push({file:f,status:'ready'});}renderUpbar();ar();ff.value='';};

function td(){document.body.classList.toggle('dark');const d=document.body.classList.contains('dark');document.getElementById('darkBtn').textContent=d?'🌙':'☀';localStorage.setItem('cs-dark-override',d?'1':'0');}
/* dark-v4 */ (function(){if(!localStorage.getItem('dark-init-v4')){localStorage.removeItem('cs-dark');localStorage.removeItem('cs-dark-override');localStorage.setItem('dark-init-v4','1');}var v=localStorage.getItem('cs-dark-override');var dark=(v===null)?window.matchMedia('(prefers-color-scheme:dark)').matches:(v==='1');if(dark)document.body.classList.add('dark');var btn=document.getElementById('darkBtn');if(btn)btn.textContent=dark?'🌙':'☀';})();
</script>
</body>
</html>
