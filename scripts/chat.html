<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{agent_name} - Cloud-Soul</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<style>
:root {
  --blue: #4d6bfe;
  --blue-hover: #3b5de7;
  --bg: #f5f6f8;
  --surface: #fff;
  --text: #1a1a2e;
  --text-secondary: #666;
  --text-tertiary: #999;
  --border: #e5e7eb;
  --border-light: #f0f0f0;
  --code-bg: #f6f8fa;
  --inline-code-bg: #f0f0f5;
  --inline-code-color: #d63384;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --radius: 12px;
}
.dark {
  --bg: #1a1a2e;
  --surface: #16213e;
  --text: #eee;
  --text-secondary: #aab;
  --text-tertiary: #778;
  --border: #2a2a4a;
  --border-light: #2a2a4a;
  --code-bg: #111827;
  --inline-code-bg: #1e293b;
  --inline-code-color: #f0a060;
  --shadow: 0 1px 3px rgba(0,0,0,0.3);
}

* { margin:0;padding:0;box-sizing:border-box; }

body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
}

/* ===== Header ===== */
.header {
  display: flex; align-items: center; gap: 10px; padding: 0 24px; height: 56px;
  background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.header .logo { width: 30px; height: 30px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 16px; }
.header h1 { font-size: 15px; font-weight: 600; }
.header .actions { margin-left: auto; display: flex; gap: 6px; }
.header button {
  width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent;
  color: var(--text-secondary); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
}
.header button:hover { background: var(--bg); color: var(--text); }

/* ===== Messages ===== */
.messages {
  flex: 1; overflow-y: auto; padding: 24px 0;
}
.messages-inner {
  max-width: 800px; margin: 0 auto; padding: 0 24px;
  display: flex; flex-direction: column; gap: 24px;
}

.msg { display: flex; gap: 12px; animation: fadeIn .25s ease; }
.msg.agent { flex-direction: row; }
.msg.user  { flex-direction: row-reverse; }

.msg .avatar {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  background: var(--bg); color: var(--text-secondary);
  margin-top: 2px;
}
.msg.user .avatar { background: var(--blue); color: #fff; }

.msg .body { display: flex; flex-direction: column; gap: 4px; max-width: 100%; }
.msg.user .body { align-items: flex-end; }
.msg .bubble {
  padding: 10px 16px; border-radius: var(--radius); line-height: 1.7; font-size: 14px;
  word-break: break-word; max-width: 100%;
}
.msg.agent .bubble { background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow); }
.msg.user  .bubble { background: var(--blue); color: #fff; }
.msg .time { font-size: 11px; color: var(--text-tertiary); padding: 0 2px; }

.welcome { text-align: center; padding: 80px 20px; }
.welcome .icon { font-size: 52px; margin-bottom: 12px; }
.welcome h2 { font-size: 20px; color: var(--text); margin-bottom: 6px; }
.welcome p { font-size: 14px; color: var(--text-tertiary); }

/* ===== Markdown ===== */
.bubble p { margin: 4px 0; }
.bubble h1 { font-size: 19px; margin: 16px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.bubble h2 { font-size: 17px; margin: 14px 0 6px; }
.bubble h3 { font-size: 15px; margin: 12px 0 4px; }
.bubble ul,.bubble ol { padding-left: 22px; margin: 6px 0; }
.bubble li { margin: 2px 0; }
.bubble blockquote {
  border-left: 3px solid var(--blue); padding: 6px 14px; margin: 8px 0;
  background: var(--bg); border-radius: 0 8px 8px 0; color: var(--text-secondary);
}
.bubble table { border-collapse: collapse; margin: 8px 0; width: 100%; display: block; overflow-x: auto; }
.bubble th,.bubble td { border: 1px solid var(--border-light); padding: 8px 12px; text-align: left; }
.bubble th { background: var(--bg); font-weight: 600; }
.bubble hr { border: none; border-top: 1px solid var(--border-light); margin: 14px 0; }
.bubble a { color: var(--blue); }
.bubble :not(pre)>code {
  background: var(--inline-code-bg); color: var(--inline-code-color);
  padding: 2px 6px; border-radius: 4px; font-size: 13px;
  font-family: "JetBrains Mono","Fira Code",monospace;
}
.bubble pre {
  background: var(--code-bg); border-radius: 8px; padding: 16px;
  overflow-x: auto; margin: 10px 0; position: relative;
  border: 1px solid var(--border-light);
}
.bubble pre code { font-family: "JetBrains Mono","Fira Code",monospace; font-size: 13px; line-height: 1.6; }
.bubble .copy-btn {
  position: absolute; top: 8px; right: 8px; padding: 4px 10px;
  background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer; font-size: 11px; opacity: 0; transition: .2s;
}
.bubble pre:hover .copy-btn { opacity: 1; }
.bubble .copy-btn.copied { background: #4caf50; color: #fff; border-color: #4caf50; }

/* ===== Input ===== */
.input-area {
  padding: 0 24px 20px; flex-shrink: 0;
}
.input-area .wrapper {
  max-width: 800px; margin: 0 auto; display: flex; align-items: center;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 4px;
}
.input-area textarea {
  flex: 1; padding: 10px 12px; border: none; background: transparent;
  color: var(--text); font-family: inherit; font-size: 14px; outline: none;
  resize: none; min-height: 40px; max-height: 160px; line-height: 1.5;
}
.input-area .send-btn {
  padding: 8px 18px; background: var(--blue); color: #fff; border: none;
  border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500;
  white-space: nowrap; height: 36px; margin: 2px;
}
.input-area .send-btn:hover { background: var(--blue-hover); }
.input-area .send-btn:disabled { opacity: .5; cursor: not-allowed; }
#status { font-size: 11px; color: var(--text-tertiary); text-align: center; padding: 4px 0 0; }

.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
.dark .messages::-webkit-scrollbar-thumb { background: #334; }

@keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }
</style>

<link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="header">
  <div class="logo">🤖</div>
  <h1>{agent_name}</h1>
  <div class="actions">
    <button id="theme-btn" title="切换深浅色">🌓</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="messages-inner" id="messages-inner">
    <div class="welcome" id="welcome">
      <div class="icon">👋</div>
      <h2>你好，我是 {agent_name}</h2>
      <p>在下方输入消息，开始对话</p>
    </div>
  </div>
</div>
<div id="status">已连接</div>
<div class="input-area">
  <div class="wrapper">
    <textarea id="msg-input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
    <button class="send-btn" id="send-btn">发送</button>
  </div>
</div>

<script>
// ========== Theme ==========
const body = document.body;
const themeBtn = document.getElementById('theme-btn');
const hljsTheme = document.getElementById('hljs-theme');
const saved = localStorage.getItem('theme_ds') || 'light';
if (saved === 'dark') { body.classList.add('dark'); hljsTheme.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'; }
themeBtn.textContent = saved === 'dark' ? '☀️' : '🌙';
themeBtn.addEventListener('click', () => {
  const isDark = body.classList.toggle('dark');
  localStorage.setItem('theme_ds', isDark ? 'dark' : 'light');
  hljsTheme.href = isDark
    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
  themeBtn.textContent = isDark ? '☀️' : '🌙';
});

// ========== Markdown ==========
marked.setOptions({ breaks: true, gfm: true });
function renderMD(t) { return marked.parse(t); }

function highlightCode(el) {
  el.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
    const pre = block.parentElement;
    if (pre.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-btn'; btn.textContent = 'Copy';
    btn.onclick = () => {
      navigator.clipboard.writeText(block.textContent).then(() => {
        btn.textContent = 'Copied!'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    };
    pre.appendChild(btn);
  });
}

// ========== Messages ==========
const msgsInner = document.getElementById('messages-inner');
const inputEl = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');
let welcomeRemoved = false;

function removeWelcome() {
  if (welcomeRemoved) return;
  const w = document.getElementById('welcome');
  if (w) w.remove();
  welcomeRemoved = true;
}

function addMessage(text, role) {
  removeWelcome();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const now = new Date();
  const ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const avatar = role === 'user' ? '👤' : '🤖';
  const html = role === 'user'
    ? text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    : renderMD(text);
  div.innerHTML =
    '<div class="avatar">' + avatar + '</div>' +
    '<div class="body"><div class="bubble">' + html + '</div><div class="time">' + ts + '</div></div>';
  msgsInner.appendChild(div);
  if (role === 'agent') highlightCode(div);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

// ========== Input ==========
function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
}
inputEl.addEventListener('input', autoResize);

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  inputEl.value = ''; autoResize();
  statusEl.textContent = '发送中...'; sendBtn.disabled = true;
  try {
    const res = await fetch('/send', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message:text})
    });
    const data = await res.json();
    statusEl.textContent = data.success ? '已发送' : '失败: '+(data.error||'unknown');
  } catch(e) { statusEl.textContent = '连接错误'; }
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ========== SSE ==========
const evtSource = new EventSource('/stream');
evtSource.onmessage = event => { addMessage(event.data, 'agent'); statusEl.textContent = '已连接'; };
evtSource.onerror = () => { statusEl.textContent = '重连中...'; };
</script>
</body>
</html>
