<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{agent_name}</title>
<style>
:root {
  --color-bg: #ffffff;
  --color-bg-secondary: #f6f8fa;
  --color-bg-tertiary: #f3f4f6;
  --color-surface: #ffffff;
  --color-border: #d0d7de;
  --color-border-muted: #d8dee4;
  --color-text: #1f2328;
  --color-text-secondary: #656d76;
  --color-text-tertiary: #8b949e;
  --color-accent: #0969da;
  --color-accent-hover: #0550ae;
  --color-success: #1a7f37;
  --color-danger: #cf222e;
  --color-warning: #9a6700;
  --shadow-sm: 0 1px 0 rgba(31,35,40,0.04);
  --shadow-md: 0 3px 6px rgba(140,149,159,0.15);
  --radius: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'Consolas', 'Courier New', monospace;
}
.dark {
  --color-bg: #0d1117;
  --color-bg-secondary: #161b22;
  --color-bg-tertiary: #21262d;
  --color-surface: #161b22;
  --color-border: #30363d;
  --color-border-muted: #21262d;
  --color-text: #e6edf3;
  --color-text-secondary: #8b949e;
  --color-text-tertiary: #6e7681;
  --color-accent: #58a6ff;
  --color-accent-hover: #79c0ff;
  --color-success: #3fb950;
  --color-danger: #f85149;
  --color-warning: #d29922;
  --shadow-sm: 0 1px 0 rgba(0,0,0,0.2);
  --shadow-md: 0 3px 6px rgba(0,0,0,0.3);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: var(--font);
  background: var(--color-bg);
  color: var(--color-text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ── */
.header {
  flex-shrink: 0;
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  background: var(--color-bg-secondary);
  border-bottom: 1px solid var(--color-border);
}
.header-logo {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--color-bg-tertiary);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  margin-right: 8px;
}
.header-title {
  font-weight: 600;
  font-size: 14px;
  color: var(--color-text);
  flex: 1;
}
.header-actions { display:flex; gap:4px; }
.gh-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 12px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  background: var(--color-bg);
  color: var(--color-text);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font);
  transition: background .12s;
  line-height: 20px;
}
.gh-btn:hover { background: var(--color-bg-tertiary); }
.gh-btn-icon {
  width: 28px; height: 28px; padding: 0;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius);
  border: 1px solid var(--color-border);
  background: var(--color-bg);
  cursor: pointer;
  font-size: 14px;
  color: var(--color-text-secondary);
  transition: background .12s;
}
.gh-btn-icon:hover { background: var(--color-bg-tertiary); }

/* ── Messages ── */
.msgs {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0 24px;
}
.msgs-inner {
  max-width: 896px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.msg-row {
  display: flex;
  gap: 10px;
  animation: fade-in .2s ease-out;
}
@keyframes fade-in { from{opacity:0} to{opacity:1} }
.msg-row.user { flex-direction: row-reverse; }
.msg-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.msg-row.user .msg-body { align-items: flex-end; }

.ava {
  width: 32px; height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
  overflow: hidden;
  border: 1px solid var(--color-border);
  margin-top: 2px;
}
.ava img { width: 100%; height: 100%; object-fit: cover; }

.bub {
  font-size: 14px;
  line-height: 1.55;
  max-width: 100%;
}
.msg-row.agent .bub { padding: 4px 0; }
.msg-row.user .bub {
  background: var(--color-accent);
  color: #ffffff;
  padding: 8px 14px;
  border-radius: 16px;
  max-width: 75%;
  font-weight: 400;
}

/* ── Markdown (GitHub Primer style) ── */
.bub h1,.bub h2,.bub h3,.bub h4 {
  font-weight: 600;
  margin: 24px 0 8px;
  padding-bottom: 0;
  border-bottom: none;
}
.bub h1:first-child,.bub h2:first-child,.bub h3:first-child,.bub h4:first-child { margin-top:0; }
.bub h1 { font-size:1.75em; border-bottom:1px solid var(--color-border-muted); padding-bottom:6px; }
.bub h2 { font-size:1.4em; border-bottom:1px solid var(--color-border-muted); padding-bottom:5px; }
.bub h3 { font-size:1.15em; }
.bub h4 { font-size:1em; }
.bub hr { border:none; border-top:1px solid var(--color-border); margin:20px 0; }
.bub code {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--color-bg-tertiary);
  padding: 2px 5px;
  border-radius: var(--radius);
  color: var(--color-text);
}
.msg-row.user .bub code { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.95); }
.bub pre {
  background: var(--color-bg-tertiary);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  overflow-x: auto;
  margin: 12px 0;
  white-space: pre-wrap;
  word-break: break-all;
  border: 1px solid var(--color-border);
}
.bub pre code { background: none; padding: 0; font-size: 12px; line-height: 1.45; }
.bub ul,.bub ol { margin:4px 0; padding-left:2em; }
.bub li { margin:2px 0; }
.bub li+li { margin-top:2px; }
.bub table {
  border-collapse: collapse; margin: 10px 0; width: 100%;
  font-size: 13px;
}
.bub th,.bub td {
  border: 1px solid var(--color-border);
  padding: 7px 13px; text-align: left;
}
.bub th { background: var(--color-bg-secondary); font-weight: 600; }
.bub tr:nth-child(even) td { background: var(--color-bg-secondary); }
.bub blockquote {
  border-left: 3px solid var(--color-border);
  padding: 0 1em;
  margin: 8px 0;
  color: var(--color-text-secondary);
}
.bub a { color: var(--color-accent); text-decoration: none; }
.bub a:hover { text-decoration: underline; }
.bub strong { font-weight: 600; }
.bub img { max-width: 100%; border-radius: var(--radius); margin: 6px 0; }

/* Code wrap */
.wrap { border-radius: var(--radius-md); overflow: hidden; margin: 12px 0; border: 1px solid var(--color-border); }
.cb-banner {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 12px; font-size: 11px;
  font-family: var(--font-mono);
  background: var(--color-bg-secondary);
  color: var(--color-text-secondary);
  border-bottom: 1px solid var(--color-border);
}
.cb-copy-btn {
  display: inline-flex; align-items: center; cursor: pointer;
  border: 1px solid var(--color-border); background: var(--color-bg);
  font-size: 11px; padding: 3px 10px; border-radius: var(--radius);
  transition: background .12s; font-family: var(--font); color: var(--color-text-secondary);
}
.cb-copy-btn:hover { background: var(--color-bg-tertiary); }

/* ── Attachments ── */
.attaches { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.attaches .fchip {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--radius-md);
  background: var(--color-bg-secondary);
  border: 1px solid var(--color-border);
  width: 340px; max-width: 100%;
}
.attaches .fc { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; overflow: hidden; }
.attaches .fn { font-size: 13px; color: var(--color-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.attaches .fs { font-size: 11px; color: var(--color-text-secondary); }

.time {
  font-size: 11px; color: var(--color-text-tertiary); margin-top: 3px;
}
.msg-row.user .time { text-align: right; }

/* ── Empty State ── */
.empty-hint {
  text-align: center; color: var(--color-text-secondary);
  margin-top: 80px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.empty-hint .logo {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--color-bg-tertiary);
  border: 2px solid var(--color-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
}
.empty-hint .title {
  font-size: 16px; font-weight: 600; color: var(--color-text);
}
.empty-hint .subtitle {
  font-size: 13px; max-width: 300px; line-height: 1.5;
}

/* ── Input ── */
.bottom {
  flex-shrink: 0;
  padding: 12px 24px 18px;
  border-top: 1px solid var(--color-border);
  background: var(--color-bg);
}
.bottom-inner { max-width: 896px; margin: 0 auto; }

.up-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; min-height: 0; }
.up-chip {
  display: flex; align-items: center; gap: 8px;
  background: var(--color-bg-tertiary);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 6px 12px; font-size: 12px;
}
.up-chip .c-name { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.up-chip .rm { cursor: pointer; color: var(--color-text-secondary); font-weight: 600; }
.up-chip .rm:hover { color: var(--color-danger); }

.inp-bar {
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--color-bg-secondary);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 8px;
  transition: border-color .15s, box-shadow .15s;
}
.inp-bar:focus-within {
  border-color: var(--color-accent);
  box-shadow: 0 0 0 3px rgba(9,105,218,0.15);
}
.dark .inp-bar:focus-within { box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }

.inp-bar textarea {
  flex: 1; border: none; background: transparent; color: var(--color-text);
  font-size: 14px; line-height: 1.5; resize: none; outline: none;
  min-height: 110px; max-height: 250px;
  font-family: var(--font);
  padding: 6px 4px;
}
.inp-bar textarea::placeholder { color: var(--color-text-tertiary); }

.toolbar-btn {
  width: 32px; height: 32px;
  border: none; background: transparent;
  border-radius: var(--radius);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--color-text-secondary);
  transition: background .12s;
}
.toolbar-btn:hover { background: var(--color-bg-tertiary); }

.send-btn {
  padding: 6px 14px; height: 32px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  background: var(--color-success);
  color: #ffffff;
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  font-family: var(--font);
  display: flex; align-items: center; gap: 4px;
  transition: background .12s;
  white-space: nowrap;
}
.send-btn:hover:not(:disabled) { background: #2c974b; }
.dark .send-btn:hover:not(:disabled) { background: #46c263; }
.send-btn:disabled {
  background: var(--color-bg-tertiary);
  color: var(--color-text-tertiary);
  cursor: default;
}

.status-bar {
  text-align: center;
  font-size: 11px;
  color: var(--color-text-tertiary);
  padding: 6px 0 0;
}

/* Scrollbar */
.msgs::-webkit-scrollbar { width: 8px; }
.msgs::-webkit-scrollbar-track { background: transparent; }
.msgs::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 4px; }
.msgs::-webkit-scrollbar-thumb:hover { background: var(--color-text-tertiary); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">⚡</div>
  <span class="header-title">Adam</span>
  <div class="header-actions">
    <button class="gh-btn-icon" onclick="td()" title="Toggle theme" id="darkBtn">🌙</button>
  </div>
</div>

<div class="msgs" id="ms"><div class="msgs-inner" id="mi">
  <div class="empty-hint">
    <div class="logo">⚡</div>
    <div class="title">Adam Cloud-Soul</div>
    <div class="subtitle">ROS2 AI Agent &middot; Multi-Session Memory &middot; Always Online</div>
  </div>
</div></div>

<div class="bottom">
  <div class="bottom-inner">
    <div class="up-bar" id="ub"></div>
    <div class="inp-bar">
      <textarea id="ti" rows="1" placeholder="Write a message..."></textarea>
      <button class="toolbar-btn" id="fb" title="Attach files">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M3.5 1a2.5 2.5 0 0 1 2.5 2.5v8.25a1.75 1.75 0 0 1-3.5 0V4.5a.75.75 0 0 1 1.5 0v7.25a.25.25 0 0 0 .5 0V3.5A1 1 0 0 0 3.5 2.5 1 1 0 0 0 2.5 3.5v8.25a2.5 2.5 0 0 0 5 0V4.5a4 4 0 0 0-4-4 4 4 0 0 0-4 4v7.25a5.5 5.5 0 0 0 11 0V4.5a.75.75 0 0 1 1.5 0v7.25a7 7 0 0 1-14 0V4.5A2.5 2.5 0 0 1 3.5 1Z"/></svg>
      </button>
      <button class="send-btn" id="sb" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1.177 1.187a.75.75 0 0 1 .097-.748l.012-.014a.75.75 0 0 1 .663-.249l13.5 3a.75.75 0 0 1 .418 1.217l-7.37 7.59 7.37 7.59a.751.751 0 0 1-.418 1.217l-13.5 3a.75.75 0 0 1-.772-1.01l3.08-9.17a.748.748 0 0 1 .525-.49l8.055-1.637-8.055-1.638a.748.748 0 0 1-.525-.49L1.08 1.95a.75.75 0 0 1 .097-.763Z"/></svg>
        Send
      </button>
    </div>
    <div class="status-bar" id="st">Ready</div>
  </div>
</div>

<input type="file" id="ff" multiple style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const sb=document.getElementById('sb'),stt=document.getElementById('st'),ti=document.getElementById('ti'),ms=document.getElementById('ms'),mi=document.getElementById('mi'),ub=document.getElementById('ub'),ff=document.getElementById('ff'),fb=document.getElementById('fb');
sb.onclick=sm;

const H_URL=location.pathname.replace(/\/$/,'');
let selFiles=[],_lastSeq=0,_hasSent=false;
marked.setOptions({breaks:true,gfm:true});

const HAS_UA=new Image();HAS_UA.src=H_URL+'/config/avatar/user.png';HAS_UA.onerror=()=>{HAS_UA.ok=0;};HAS_UA.onload=()=>{HAS_UA.ok=1;};
const HAS_AA=new Image();HAS_AA.src=H_URL+'/config/avatar/agent.png';HAS_AA.onerror=()=>{HAS_AA.ok=0;};HAS_AA.onload=()=>{HAS_AA.ok=1;};
function avaHTML(role){const img=role==='user'?HAS_UA:HAS_AA;if(img.ok)return '<div class=\"ava\"><img src=\"'+H_URL+'/config/avatar/'+role+'.png\"></div>';return '';}

function wrapCodeBlocks(el){el.querySelectorAll('.bub pre').forEach(pre=>{if(pre.closest('.wrap'))return;const cl=pre.querySelector('code');const lang=(cl&&cl.className.match(/language-(\w+)/)||[])[1]||'';const wrap=document.createElement('div');wrap.className='wrap';const banner=document.createElement('div');banner.className='cb-banner';const langSpan=document.createElement('span');langSpan.textContent=lang||'code';const copyIcon='<svg width=\"12\" height=\"12\" viewBox=\"0 0 16 16\" fill=\"currentColor\" style=\"margin-right:4px\"><path d=\"M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/><path d=\"M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>';
const checkIcon='<svg width=\"12\" height=\"12\" viewBox=\"0 0 16 16\" fill=\"currentColor\" style=\"margin-right:4px\"><path d=\"M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/></svg>';
const copyBtn=document.createElement('button');copyBtn.innerHTML=copyIcon+'Copy';copyBtn.className='cb-copy-btn';
copyBtn.onclick=()=>{const code=pre.querySelector('code')||pre;navigator.clipboard.writeText(code.textContent).then(()=>{copyBtn.innerHTML=checkIcon+'Copied';setTimeout(()=>{copyBtn.innerHTML=copyIcon+'Copy';},2000);});};
banner.appendChild(langSpan);banner.appendChild(copyBtn);wrap.appendChild(banner);pre.style.cssText='margin:0!important;border-radius:0 0 8px 8px;padding:14px 16px;white-space:pre-wrap;word-break:break-all;border:none';pre.parentNode.insertBefore(wrap,pre);wrap.appendChild(pre);});}
function highlightCode(el){el.querySelectorAll('pre code').forEach(b=>{try{hljs.highlightElement(b)}catch(e){}});wrapCodeBlocks(el);}
function szf(sz){if(sz>=1048576)return(sz/1048576).toFixed(1)+' MB';if(sz>=1024)return(sz/1024).toFixed(1)+' KB';return sz+' B';}

function am(text,role,files){
  const ei=mi.querySelector('.empty-hint');if(ei)ei.remove();
  const row=document.createElement('div');row.className='msg-row '+role;
  if(files&&files.length)text=text.replace(/\n\[附件:.*\]$/,'');
  let html=marked.parse(text||''),filesHtml='';
  if(files&&files.length){files.forEach(f=>{const nm=(f.original_name||f.name||'file').replace(/</g,'&lt;');const sz=f.size_human||szf(f.size||0);filesHtml+='<div class=\"fchip\"><div class=\"fc\"><span class=\"fn\">'+nm+'</span><span class=\"fs\">'+sz+'</span></div></div>';});}
  const ts=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  row.innerHTML=avaHTML(role)+'<div class=\"msg-body\"><div class=\"bub\">'+html+'</div>'+(filesHtml?'<div class=\"attaches\">'+filesHtml+'</div>':'')+'<div class=\"time\">'+ts+'</div></div>';
  mi.appendChild(row);highlightCode(row);ms.scrollTop=ms.scrollHeight;
}

async function poll(){
  while(true){
    try{const r=await fetch(H_URL+'/poll?after='+_lastSeq);const d=await r.json();
    if(d.messages)d.messages.forEach(m=>{if(m.role==='user'&&_hasSent){_hasSent=false;return;}am(m.msg,m.role,m.files);});
    if(d.last_seq!==undefined)_lastSeq=d.last_seq;}catch(e){}
    await new Promise(r=>setTimeout(r,2000));
  }
}

async function init(){
  try{const r=await fetch(H_URL+'/history');const d=await r.json();if(d.messages)d.messages.forEach(m=>am(m.msg,m.role,m.files));if(d.last_seq!==undefined)_lastSeq=d.last_seq;}catch(e){}
  stt.textContent='Ready';poll();
}
init();

function ar(){const v=ti.value.trim();sb.disabled=!v&&selFiles.filter(f=>f.status==='ready').length===0;ti.style.height='auto';ti.style.height=Math.min(ti.scrollHeight,250)+'px';}
ti.addEventListener('input',ar);
ti.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sm();}if(e.key==='Enter'&&e.shiftKey){e.preventDefault();ti.value+='\n';ar();}});

async function sm(){
  const t=ti.value.trim(),ready=selFiles.filter(f=>f.status==='ready');
  if(!t&&ready.length===0)return;
  if(ready.length>0){stt.textContent='Uploading...';sb.disabled=true;const ul=await uploadAll();if(!t){_hasSent=true;am('','user',ul);clearUploads();sb.disabled=false;stt.textContent='Uploaded '+ul.length+' file(s)';return;}}
  _hasSent=true;const done=selFiles.filter(f=>f.status==='done').map(f=>f.info);
  am(t,'user',done);ti.value='';ar();clearUploads();stt.textContent='Sending...';sb.disabled=true;
  try{const r=await fetch(H_URL+'/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t,files:done})});const d=await r.json();stt.textContent=d.success?'Sent':'Failed: '+(d.error||'?');}catch(e){stt.textContent='Connection error';}
  sb.disabled=false;
}

function renderUpbar(){
  let h='';selFiles.forEach((f,i)=>{const sz=szf(f.file.size);const cls=f.status==='err'?' style=\"color:#cf222e\"':'';h+='<div class=\"up-chip\"><span class=\"c-name\" title=\"'+f.file.name.replace(/\"/g,'&quot;')+'\">'+f.file.name.replace(/</g,'&lt;')+'</span><span>'+sz+'</span><span class=\"rm\" onclick=\"selFiles.splice('+i+',1);renderUpbar();ar()\">&times;</span></div>';});
  ub.innerHTML=h;
}
async function uploadAll(){
  const ready=selFiles.filter(f=>f.status==='ready');if(!ready.length)return[];
  ready.forEach(r=>r.status='uploading');renderUpbar();const fd=new FormData();ready.forEach(r=>fd.append('files',r.file));
  try{const r=await fetch(H_URL+'/upload',{method:'POST',body:fd});const d=await r.json();if(d.success&&d.files)d.files.forEach((f,i)=>{if(f.error)ready[i].status='err';else{ready[i].status='done';ready[i].info=f;}});}catch(e){ready.forEach(r=>r.status='err');}
  renderUpbar();return selFiles.filter(f=>f.status==='done').map(f=>f.info);
}
function clearUploads(){selFiles=selFiles.filter(f=>f.status!=='done');renderUpbar();}

fb.onclick=()=>ff.click();
ff.onchange=()=>{for(const f of ff.files){if(!selFiles.some(sf=>sf.file.name===f.name&&sf.file.size===f.size))selFiles.push({file:f,status:'ready'});}renderUpbar();ar();ff.value='';};

function td(){document.body.classList.toggle('dark');const d=document.body.classList.contains('dark');document.getElementById('darkBtn').textContent=d?'☀':'🌙';localStorage.setItem('cs-theme-gh',d?'dark':'light');}
(function(){const v=localStorage.getItem('cs-theme-gh');if(v==='dark'){document.body.classList.add('dark');document.getElementById('darkBtn').textContent='☀';}})();
</script>
</body>
