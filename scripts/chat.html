<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{agent_name}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070b14;
  --bg-grid: #0d1225;
  --surface: rgba(16,22,48,0.85);
  --surface-hover: rgba(24,32,64,0.9);
  --glass: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.06);
  --text: #e2e9f4;
  --text-dim: #7a85a0;
  --cyan: #00d4ff;
  --cyan-glow: rgba(0,212,255,0.15);
  --amber: #f59e0b;
  --red: #ef4444;
  --radius: 16px;
  --radius-lg: 24px;
  --font-mono: 'DM Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
  --font-sans: 'DM Sans', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.light {
  --bg: #f0f2f5;
  --bg-grid: transparent;
  --surface: rgba(255,255,255,0.9);
  --surface-hover: rgba(255,255,255,1);
  --glass: rgba(0,0,0,0.02);
  --glass-border: rgba(0,0,0,0.08);
  --text: #1a1d28;
  --text-dim: #6b7280;
  --cyan: #0891b2;
  --cyan-glow: rgba(8,145,178,0.08);
  --amber: #d97706;
}

*{margin:0;padding:0;box-sizing:border-box}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background-image:
    linear-gradient(rgba(0,212,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
}
.light body { background-image: none; }

/* ── Top Bar ── */
.topbar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--glass-border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 10;
}
.tb-left { display:flex; align-items:center; gap:12px; }
.tb-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 8px #22c55e88;
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
.tb-name {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.5px;
  color: var(--text);
}
.tb-status {
  font-size: 11px;
  color: var(--text-dim);
  font-family: var(--font-mono);
  letter-spacing: 0.3px;
}
.tb-actions { display:flex; gap:8px; }
.tb-btn {
  width: 36px; height: 36px;
  border: 1px solid var(--glass-border);
  background: var(--glass);
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  transition: all .2s;
}
.tb-btn:hover { background: var(--surface-hover); color: var(--text); border-color: var(--cyan-glow); }

/* ── Messages ── */
.msgs {
  flex: 1;
  overflow-y: auto;
  padding: 24px 0 80px;
}
.msgs-inner {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.msg-row { display:flex; gap:10px; animation: fadeUp .35s ease-out; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.msg-row.user { flex-direction:row-reverse; }
.msg-body { flex:1; min-width:0; display:flex; flex-direction:column; }
.msg-row.user .msg-body { align-items:flex-end; }

.bub {
  padding: 14px 18px;
  border-radius: var(--radius-lg);
  font-size: 15px;
  line-height: 1.7;
  max-width: 100%;
}
.msg-row.agent .bub {
  background: transparent;
  padding: 12px 0;
}
.msg-row.user .bub {
  background: linear-gradient(135deg, rgba(0,212,255,0.12), rgba(0,212,255,0.04));
  border: 1px solid rgba(0,212,255,0.1);
  max-width: 75%;
}

.msg-row.agent .bub p { margin:6px 0; }
.msg-row.agent .bub p:first-child { margin-top:0; }
.msg-row.agent .bub p:last-child { margin-bottom:0; }
.msg-row.user .bub p { margin:4px 0; }

/* ── Markdown ── */
.bub h1,.bub h2,.bub h3 { font-weight:600; margin:18px 0 8px; color: var(--text); }
.bub h1 { font-size:1.5em; }
.bub h2 { font-size:1.25em; border-bottom:1px solid var(--glass-border); padding-bottom:4px; }
.bub h3 { font-size:1.1em; }
.bub hr { border:none; border-top:1px solid var(--glass-border); margin:16px 0; }
.bub code {
  font-family: var(--font-mono);
  font-size: 13px;
  background: rgba(0,212,255,0.08);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--cyan);
}
.bub pre {
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 16px 18px;
  overflow-x: auto;
  margin: 14px 0;
  white-space: pre-wrap;
  word-break: break-all;
}
.bub pre code { background:none; padding:0; color:var(--text); font-size:13px; line-height:1.6; }
.bub ul,.bub ol { margin:8px 0; padding-left:22px; }
.bub li { margin:3px 0; }
.bub table { border-collapse:collapse; margin:10px 0; width:100%; font-size:13px; border-radius:8px; overflow:hidden; }
.bub th,.bub td { border:1px solid var(--glass-border); padding:8px 12px; text-align:left; }
.bub th { background:var(--glass); font-weight:600; }
.bub blockquote {
  border-left: 3px solid var(--cyan);
  padding-left: 16px;
  margin: 14px 0;
  color: var(--text-dim);
  font-style: italic;
}
.bub a { color:var(--cyan); text-decoration:none; border-bottom:1px solid transparent; transition:border .15s; }
.bub a:hover { border-bottom-color: var(--cyan); }
.bub strong { font-weight:600; }
.bub em { font-style:italic; }
.bub img { max-width:100%; border-radius:12px; margin:8px 0; }

/* ── Code block wrapper (preserved from original) ── */
.wrap { border-radius:12px; overflow:hidden; margin:14px 0; border:1px solid var(--glass-border); }
.cb-banner {
  display:flex; justify-content:space-between; align-items:center;
  padding:9px 14px; font-size:12px; font-family:var(--font-mono);
  background:rgba(0,0,0,0.5); border-radius:12px 12px 0 0;
}
.cb-copy-btn {
  display:inline-flex; align-items:center; cursor:pointer;
  border:1px solid var(--glass-border); background:transparent;
  font-size:11px; padding:4px 10px; border-radius:16px;
  transition: all .15s; font-family:var(--font-sans); color:var(--text-dim);
}
.cb-copy-btn:hover { background:var(--surface-hover); color:var(--text); }

/* ── Files ── */
.attaches { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
.attaches .fchip {
  display:flex; align-items:center; gap:10px;
  padding:10px 16px; border-radius:14px;
  background:var(--glass); border:1px solid var(--glass-border);
  width: 340px; max-width:100%;
  backdrop-filter: blur(8px);
}
.attaches .fc { display:flex; flex-direction:column; gap:2px; min-width:0; flex:1; overflow:hidden; }
.attaches .fn { font-size:13px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.attaches .fs { font-size:11px; color:var(--text-dim); }

.time { font-size:11px; color:var(--text-dim); margin-top:4px; font-family:var(--font-mono); }
.msg-row.user .time { text-align:right; }

/* ── Empty state ── */
.empty-hint {
  text-align:center; color:var(--text-dim); margin-top:80px;
  display:flex; flex-direction:column; align-items:center; gap:16px;
}
.empty-hint .logo {
  width:80px; height:80px; border-radius:24px;
  background: linear-gradient(135deg, var(--cyan-glow), rgba(0,212,255,0.05));
  border: 1px solid var(--glass-border);
  display:flex; align-items:center; justify-content:center;
  font-size:36px;
  animation: float 4s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.empty-hint .title { font-size:18px; font-weight:500; color:var(--text); }
.empty-hint .subtitle { font-size:13px; max-width:320px; line-height:1.6; }

/* ── Bottom input ── */
.bottom {
  flex-shrink: 0;
  padding: 12px 24px 20px;
  background: linear-gradient(to top, var(--bg) 60%, transparent);
  position: relative;
}
.bottom-inner { max-width:800px; margin:0 auto; }
.up-bar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; min-height:0; }
.up-chip {
  display:flex; align-items:center; gap:8px;
  background:var(--surface); border:1px solid var(--glass-border);
  border-radius:12px; padding:8px 14px; font-size:12px;
  font-family: var(--font-mono);
}
.up-chip .c-name { max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.up-chip .rm { cursor:pointer; color:var(--text-dim); font-weight:bold; margin-left:2px; }
.up-chip .rm:hover { color:var(--red); }

.inp-bar {
  display:flex; align-items:flex-end; gap:10px;
  background: var(--surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  transition: all .3s;
  position: relative;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.inp-bar:focus-within {
  border-color: rgba(0,212,255,0.4);
  box-shadow: 0 0 30px rgba(0,212,255,0.08), 0 0 0 1px rgba(0,212,255,0.1);
}
.inp-bar textarea {
  flex:1; border:none; background:transparent; color:var(--text);
  font-size:15px; line-height:1.6; resize:none; outline:none;
  min-height: 48px; max-height: 200px;
  font-family: var(--font-sans);
  padding: 4px 0;
}
.inp-bar textarea::placeholder { color: var(--text-dim); }
.btn {
  display:flex; align-items:center; justify-content:center;
  border:none; background:transparent; color:var(--text-dim);
  cursor:pointer; border-radius:12px; flex-shrink:0;
  transition: all .2s;
}
.btn:hover { color: var(--text); }
#fb { width:38px; height:38px; border-radius:12px; }
#fb:hover { background:var(--glass); color:var(--cyan); }
.send-btn {
  width: 44px; height: 44px;
  border-radius: 14px !important;
  background: linear-gradient(135deg, #00b4d8, #0077b6) !important;
  color: #fff !important;
  box-shadow: 0 4px 20px rgba(0,180,216,0.3);
  transition: all .25s !important;
}
.send-btn:hover:not(:disabled) {
  box-shadow: 0 6px 28px rgba(0,180,216,0.45);
  transform: scale(1.04);
}
.send-btn:disabled {
  background: rgba(255,255,255,0.05) !important;
  box-shadow: none !important;
  color: var(--text-dim) !important;
  cursor: default;
}

#st {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  padding: 6px 0 0;
  font-family: var(--font-mono);
  letter-spacing: 0.3px;
}

/* ── Scrollbar ── */
.msgs::-webkit-scrollbar { width: 6px; }
.msgs::-webkit-scrollbar-track { background: transparent; }
.msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
.msgs::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* ── Syntax highlighting overrides ── */
.light .bub pre { background:rgba(0,0,0,0.03); border-color:rgba(0,0,0,0.1); }
.light .wrap { border-color:rgba(0,0,0,0.1); }
.light .cb-banner { background:rgba(0,0,0,0.03); }
.light .inp-bar { background:rgba(255,255,255,0.95); }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="tb-left">
    <div class="tb-dot"></div>
    <span class="tb-name">ADAM</span>
    <span class="tb-status">v0.4.0 · ONLINE</span>
  </div>
  <div class="tb-actions">
    <button class="tb-btn" onclick="td()" title="切换主题" id="darkBtn">☀</button>
  </div>
</div>

<!-- Messages -->
<div class="msgs" id="ms"><div class="msgs-inner" id="mi">
  <div class="empty-hint">
    <div class="logo">⚡</div>
    <div class="title">Adam Cloud-Soul</div>
    <div class="subtitle">ROS2 云端 AI Agent · 多会话共享记忆 · 随时待命</div>
  </div>
</div></div>

<!-- Bottom Input -->
<div class="bottom">
  <div class="bottom-inner">
    <div class="up-bar" id="ub"></div>
    <div class="inp-bar">
      <textarea id="ti" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"></textarea>
      <button class="btn" id="fb" title="上传文件">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <button class="btn send-btn" id="sb" title="发送" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div id="st">就绪</div>
  </div>
</div>

<input type="file" id="ff" multiple style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const sb=document.getElementById('sb'),stt=document.getElementById('st'),ti=document.getElementById('ti'),ms=document.getElementById('ms'),mi=document.getElementById('mi'),ub=document.getElementById('ub'),ff=document.getElementById('ff'),fb=document.getElementById('fb');
sb.onclick=sm;

const H_URL=location.pathname.replace(/\/$/,'');
let selFiles=[],_lastSeq=0,_hasSent=false;
marked.setOptions({breaks:true,gfm:true});

const HAS_UA=new Image();HAS_UA.src=H_URL+'/config/avatar/user.png';HAS_UA.onerror=()=>{HAS_UA.ok=0;};HAS_UA.onload=()=>{HAS_UA.ok=1;};
const HAS_AA=new Image();HAS_AA.src=H_URL+'/config/avatar/agent.png';HAS_AA.onerror=()=>{HAS_AA.ok=0;};HAS_AA.onload=()=>{HAS_AA.ok=1;};
function avaHTML(role){const img=role==='user'?HAS_UA:HAS_AA;if(img.ok)return '<div class=\"ava\"><img src=\"'+H_URL+'/config/avatar/'+role+'.png\"></div>';return '';}

function wrapCodeBlocks(el){el.querySelectorAll('.bub pre').forEach(pre=>{if(pre.closest('.wrap'))return;const cl=pre.querySelector('code');const lang=(cl&&cl.className.match(/language-(\w+)/)||[])[1]||'';const wrap=document.createElement('div');wrap.className='wrap';const banner=document.createElement('div');banner.className='cb-banner';const langSpan=document.createElement('span');langSpan.textContent=lang||'code';const copyIcon='<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-right:5px;flex-shrink:0\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\" ry=\"2\"/><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"/></svg>';
const checkIcon='<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-right:5px;flex-shrink:0\"><polyline points=\"20 6 9 17 4 12\"/></svg>';
const copyBtn=document.createElement('button');
copyBtn.innerHTML=copyIcon+'复制';
copyBtn.className='cb-copy-btn';
copyBtn.onclick=()=>{const code=pre.querySelector('code')||pre;navigator.clipboard.writeText(code.textContent).then(()=>{copyBtn.innerHTML=checkIcon+'复制';setTimeout(()=>{copyBtn.innerHTML=copyIcon+'复制';},2000);});};
banner.appendChild(langSpan);banner.appendChild(copyBtn);wrap.appendChild(banner);pre.style.cssText='margin:0!important;border-radius:0 0 12px 12px;padding:16px 18px;white-space:pre-wrap;word-break:break-all';pre.parentNode.insertBefore(wrap,pre);wrap.appendChild(pre);});}
function highlightCode(el){el.querySelectorAll('pre code').forEach(b=>{try{hljs.highlightElement(b)}catch(e){}});wrapCodeBlocks(el);}
function szf(sz){if(sz>=1048576)return(sz/1048576).toFixed(1)+'MB';if(sz>=1024)return(sz/1024).toFixed(1)+'KB';return sz+'B';}

function am(text,role,files){
  const ei=mi.querySelector('.empty-hint');if(ei)ei.remove();
  const row=document.createElement('div');row.className='msg-row '+role;
  if(files&&files.length)text=text.replace(/\n\[附件:.*\]$/,'');
  let html=marked.parse(text||''),filesHtml='';
  if(files&&files.length){files.forEach(f=>{const nm=(f.original_name||f.name||'file').replace(/</g,'&lt;');const sz=f.size_human||szf(f.size||0);filesHtml+='<div class=\"fchip\"><div class=\"fc\"><span class=\"fn\">'+nm+'</span><span class=\"fs\">'+sz+'</span></div></div>';});}
  const ts=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  row.innerHTML=avaHTML(role)+'<div class=\"msg-body\"><div class=\"bub\">'+html+'</div>'+(filesHtml?'<div class=\"attaches\">'+filesHtml+'</div>':'')+'<div class=\"time\">'+ts+'</div></div>';
  mi.appendChild(row);highlightCode(row);ms.scrollTop=ms.scrollHeight;
}

async function poll(){
  while(true){
    try{const r=await fetch(H_URL+'/poll?after='+_lastSeq);const d=await r.json();
    if(d.messages)d.messages.forEach(m=>{if(m.role==='user'&&_hasSent){_hasSent=false;return;}am(m.msg,m.role,m.files);});
    if(d.last_seq!==undefined)_lastSeq=d.last_seq;}catch(e){}
    await new Promise(r=>setTimeout(r,2000));
  }
}

async function init(){
  try{const r=await fetch(H_URL+'/history');const d=await r.json();if(d.messages)d.messages.forEach(m=>am(m.msg,m.role,m.files));if(d.last_seq!==undefined)_lastSeq=d.last_seq;}catch(e){}
  stt.textContent='就绪';poll();
}
init();

function ar(){const v=ti.value.trim();sb.disabled=!v&&selFiles.filter(f=>f.status==='ready').length===0;ti.style.height='auto';ti.style.height=Math.min(ti.scrollHeight,200)+'px';}
ti.addEventListener('input',ar);
ti.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sm();}if(e.key==='Enter'&&e.shiftKey){e.preventDefault();ti.value+='\n';ar();}});

async function sm(){
  const t=ti.value.trim(),ready=selFiles.filter(f=>f.status==='ready');
  if(!t&&ready.length===0)return;
  if(ready.length>0){stt.textContent='上传文件中...';sb.disabled=true;const ul=await uploadAll();if(!t){_hasSent=true;am('','user',ul);clearUploads();sb.disabled=false;stt.textContent='已上传 '+ul.length+' 个文件';return;}}
  _hasSent=true;const done=selFiles.filter(f=>f.status==='done').map(f=>f.info);
  am(t,'user',done);ti.value='';ar();clearUploads();stt.textContent='发送中...';sb.disabled=true;
  try{const r=await fetch(H_URL+'/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t,files:done})});const d=await r.json();stt.textContent=d.success?'已发送':'失败: '+(d.error||'?');}catch(e){stt.textContent='连接错误';}
  sb.disabled=false;
}

function renderUpbar(){
  let h='';selFiles.forEach((f,i)=>{const sz=szf(f.file.size);const cls=f.status==='err'?' style=\"color:#ef4444\"':'';h+='<div class=\"up-chip\"><span class=\"c-name\" title=\"'+f.file.name.replace(/\"/g,'&quot;')+'\">'+f.file.name.replace(/</g,'&lt;')+'</span><span>'+sz+'</span><span class=\"rm\" onclick=\"selFiles.splice('+i+',1);renderUpbar();ar()\">×</span></div>';});
  ub.innerHTML=h;
}
async function uploadAll(){
  const ready=selFiles.filter(f=>f.status==='ready');if(!ready.length)return[];
  ready.forEach(r=>r.status='uploading');renderUpbar();const fd=new FormData();ready.forEach(r=>fd.append('files',r.file));
  try{const r=await fetch(H_URL+'/upload',{method:'POST',body:fd});const d=await r.json();if(d.success&&d.files)d.files.forEach((f,i)=>{if(f.error)ready[i].status='err';else{ready[i].status='done';ready[i].info=f;}});}catch(e){ready.forEach(r=>r.status='err');}
  renderUpbar();return selFiles.filter(f=>f.status==='done').map(f=>f.info);
}
function clearUploads(){selFiles=selFiles.filter(f=>f.status!=='done');renderUpbar();}

fb.onclick=()=>ff.click();
ff.onchange=()=>{for(const f of ff.files){if(!selFiles.some(sf=>sf.file.name===f.name&&sf.file.size===f.size))selFiles.push({file:f,status:'ready'});}renderUpbar();ar();ff.value='';};

function td(){document.body.classList.toggle('light');const d=document.body.classList.contains('light');document.getElementById('darkBtn').textContent=d?'🌙':'☀';localStorage.setItem('cs-theme-v5',d?'light':'dark');}
(function(){const v=localStorage.getItem('cs-theme-v5');if(v==='light'){document.body.classList.add('light');document.getElementById('darkBtn').textContent='🌙';}})();
</script>
</body>
</html>
