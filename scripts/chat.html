<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{agent_name}</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<style>
:root {
  --bg: #f5f5f5;
  --surface: #fff;
  --text: #1d1d1f;
  --text2: #6e6e73;
  --text3: #aeaeb2;
  --blue: #1967d2;
  --blue-light: #e8f0fe;
  --border: #e0e0e0;
  --code-bg: #f6f8fa;
  --user-bg: #e8f0fe;
  --radius: 24px;
}
.dark {
  --bg: #212327;
  --surface: #2a2b2e;
  --text: #e8eaed;
  --text2: #9aa0a6;
  --text3: #6e7681;
  --blue: #8ab4f8;
  --blue-light: #1a2332;
  --border: #3c4043;
  --code-bg: #1e1e1e;
  --user-bg: #1e3a5f;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
  transition: background .25s, color .25s;
}

/* ====== Header ====== */
.hdr {
  height: 56px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 12px; flex-shrink: 0;
}
.hdr .logo { font-size: 24px; }
.hdr .t { font-size: 15px; font-weight: 500; color: var(--text); }
.hdr .sp { flex:1; }
.hdr .tbtn {
  width: 34px; height: 34px; border: none; background: transparent; border-radius: 50%;
  font-size: 18px; cursor: pointer; transition: .15s;
}
.hdr .tbtn:hover { background: var(--bg); }

/* ====== Messages ====== */
.msgs { flex:1; overflow-y: auto; padding: 32px 0; }
.msgs-inner {
  max-width: 760px; margin: 0 auto; padding: 0 32px;
  display: flex; flex-direction: column; gap: 36px;
}

.msg { display:flex; gap: 14px; animation: fade .3s ease; }
.msg.ai { flex-direction: row; }
.msg.hu { flex-direction: row-reverse; }

.msg .ava {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
  background: var(--bg); color: var(--text2); margin-top: 2px;
}
.msg.hu .ava { background: var(--blue); color: #fff; }

.msg .wrap { display: flex; flex-direction: column; gap: 4px; max-width: 100%; }
.msg.hu .wrap { align-items: flex-end; }
.msg .time { font-size: 11px; color: var(--text3); padding: 0 4px; }

/* AI: no bubble, pure text */
.msg.ai .bub {
  padding: 0; line-height: 1.8; font-size: 15px; word-break: break-word;
}
/* User: light blue rounded bubble */
.msg.hu .bub {
  padding: 12px 20px; border-radius: var(--radius); background: var(--user-bg);
  color: var(--text); font-size: 15px; line-height: 1.6; word-break: break-word;
  max-width: 600px;
}

/* welcome */
.wel { text-align: center; padding: 80px 20px; }
.wel .ic { font-size: 56px; margin-bottom: 16px; }
.wel h2 { font-size: 24px; font-weight: 500; margin-bottom: 8px; color: var(--text); }
.wel p { font-size: 15px; color: var(--text3); }

/* markdown inside AI bubble */
.bub p { margin: 10px 0; }
.bub p:first-child { margin-top: 0; }
.bub h1 { font-size: 20px; margin: 22px 0 12px; font-weight: 600; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.bub h2 { font-size: 17px; margin: 20px 0 8px; font-weight: 600; }
.bub h3 { font-size: 15px; margin: 16px 0 6px; font-weight: 600; }
.bub ul,.bub ol { padding-left: 24px; margin: 10px 0; }
.bub li { margin: 4px 0; }
.bub blockquote {
  border-left: 3px solid var(--blue); padding: 8px 16px; margin: 12px 0;
  background: var(--bg); border-radius: 0 8px 8px 0; color: var(--text2);
}
.bub table { border-collapse: collapse; margin: 10px 0; width: 100%; display: block; overflow-x: auto; }
.bub th,.bub td { border: 1px solid var(--border); padding: 10px 14px; text-align: left; }
.bub th { background: var(--bg); font-weight: 600; font-size: 14px; }
.bub td { font-size: 14px; }
.bub hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
.bub a { color: var(--blue); }

.bub :not(pre)>code {
  background: var(--blue-light); color: var(--blue);
  padding: 3px 7px; border-radius: 5px; font-size: 13px;
  font-family: "SF Mono","Fira Code","JetBrains Mono",monospace;
}
.bub pre {
  background: var(--code-bg); border-radius: 12px; padding: 20px;
  overflow-x: auto; margin: 14px 0; position: relative;
  border: 1px solid var(--border);
}
.bub pre code { font-family: "SF Mono","Fira Code","JetBrains Mono",monospace; font-size: 13px; line-height: 1.7; }
.bub .cpy {
  position: absolute; top: 10px; right: 10px; padding: 5px 12px;
  background: var(--surface); color: var(--text2); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; font-size: 12px; opacity: 0; transition: .2s;
  font-family: inherit;
}
.bub pre:hover .cpy { opacity: 1; }
.bub .cpy.ok { background: #34a853; color: #fff; border-color: #34a853; }

/* ====== Input ====== */
.inp { padding: 0 24px 24px; flex-shrink: 0; }
.inp-wrap {
  max-width: 760px; margin: 0 auto;
  background: var(--surface); border: 1px solid var(--border); border-radius: 28px;
  padding: 4px 8px 4px 20px; display: flex; align-items: flex-end;
  box-shadow: 0 1px 6px rgba(32,33,36,.08);
  transition: box-shadow .2s, border-color .2s;
}
.inp-wrap:focus-within {
  border-color: var(--blue);
  box-shadow: 0 1px 6px rgba(32,33,36,.12), 0 0 0 2px rgba(25,103,210,.1);
}
.inp textarea {
  flex: 1; padding: 10px 0; border: none; background: transparent;
  color: var(--text); font-family: inherit; font-size: 15px; outline: none;
  resize: none; min-height: 24px; max-height: 160px; line-height: 1.5;
}
.inp .sbt {
  padding: 8px 22px; background: var(--blue); color: #fff; border: none;
  border-radius: 22px; cursor: pointer; font-size: 14px; font-weight: 500;
  white-space: nowrap; height: 36px; margin: 4px 2px;
  transition: opacity .15s;
}
.inp .sbt:hover { opacity: .85; }
.inp .sbt:disabled { opacity: .4; cursor: not-allowed; }

#stt { font-size: 12px; color: var(--text3); text-align: center; padding: 6px 0 0; }

.msgs::-webkit-scrollbar { width: 5px; }
.msgs::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 3px; }
.dark .msgs::-webkit-scrollbar-thumb { background: #444; }

@keyframes fade { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

/* file upload styles */
.upbtn {
  width: 36px; height: 36px; border: none; background: transparent;
  border-radius: 50%; cursor: pointer; transition: .15s;
  display: flex; align-items: center; justify-content: center;
  margin: 4px 2px; padding: 0; position: relative; overflow: hidden;
  color: var(--text2);
}
.upbtn svg { width: 18px; height: 18px; pointer-events: none; }
.upbtn:hover { background: var(--bg); color: var(--text); }
.upbtn input[type=file] {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer;
}
.up-bar {
  max-width: 760px; margin: 0 auto 6px; padding: 0 4px;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.up-chip {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 6px 3px 10px; border-radius: 12px;
  background: var(--blue-light); color: var(--blue);
  font-size: 12px;
}
.up-chip .c-name { max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.up-chip .c-rm { cursor: pointer; width: 16px; height: 16px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 12px; line-height: 1; }
.up-chip .c-rm:hover { background: rgba(0,0,0,.1); }
.up-chip.done { background: #e6f4ea; color: #1e8e3e; }
.up-chip.err { background: #fce8e6; color: #d93025; }


/* file chips inside user bubble */
.bub .fchips {
  display: flex; flex-direction: column; gap: 8px; margin-top: 12px;
  width: 100%;
}
.bub .fchip {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 13px;
  transition: box-shadow .15s, border-color .15s;
  cursor: default;
  width: 100%;
  box-sizing: border-box;
}
.bub .fchip:hover {
  border-color: var(--blue);
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.fchip .fi {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; flex-shrink: 0;
  color: #fff; letter-spacing: 0;
}
.fchip .fi.img { background: #ea4335; }
.fchip .fi.cad { background: #4285f4; }
.fchip .fi.code { background: #34a853; }
.fchip .fi.doc { background: #1967d2; }
.fchip .fi.archive { background: #f9ab00; }
.fchip .fi.media { background: #9334e6; }
.fchip .fi.other { background: #5f6368; }
.fchip .fc {
  display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1;
}
.fchip .fn {
  font-size: 13px; font-weight: 500;
  overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap;
}
.fchip .fs {
  font-size: 11px; color: var(--text2); white-space: nowrap;
}

</style>
<link rel="stylesheet" id="hl" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="hdr">
  <div class="logo">🤖</div>
  <div class="t">{agent_name}</div>
  <div class="sp"></div>
  <button class="tbtn" id="tbtn" title="切换主题">🌓</button>
</div>

<div class="msgs" id="ms">
  <div class="msgs-inner" id="mi">
    <div class="wel" id="ww">
      <div class="ic">👋</div>
      <h2>你好，我是 {agent_name}</h2>
      <p>在下方输入消息开始对话</p>
    </div>
  </div>
</div>
<div id="stt">已连接</div>
<div class="up-bar" id="upbar"></div>
<div class="inp">
  <div class="inp-wrap">
    <button class="upbtn" id="ubtn" title="上传文件">
<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
<input type="file" id="ufile" multiple>
</button>
    <textarea id="ti" placeholder="输入消息..." rows="1"></textarea>
    <button class="sbt" id="sb">发送</button>
  </div>
</div>

<script>
const bd=document.body, tbtn=document.getElementById('tbtn'), hl=document.getElementById('hl');
const s=localStorage.getItem('theme')||'light';
if(s==='dark'){bd.classList.add('dark');hl.href='https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';}
tbtn.textContent=s==='dark'?'☀️':'🌙';
tbtn.onclick=()=>{
  const d=bd.classList.toggle('dark');
  localStorage.setItem('theme',d?'dark':'light');
  hl.href=d?'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css':'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
  tbtn.textContent=d?'☀️':'🌙';
};

marked.setOptions({breaks:true,gfm:true});
function rd(t){return marked.parse(t);}

function hc(el){
  el.querySelectorAll('pre code').forEach(b=>{
    hljs.highlightElement(b);
    const p=b.parentElement;
    if(p.querySelector('.cpy'))return;
    const btn=document.createElement('button');
    btn.className='cpy';btn.textContent='复制';
    btn.onclick=()=>{
      navigator.clipboard.writeText(b.textContent).then(()=>{
        btn.textContent='✓ 已复制';btn.classList.add('ok');
        setTimeout(()=>{btn.textContent='复制';btn.classList.remove('ok');},2000);
      });
    };
    p.appendChild(btn);
  });
}

const mi=document.getElementById('mi'), ti=document.getElementById('ti'),
      sb=document.getElementById('sb'), stt=document.getElementById('stt');
let wr=false;

function rw(){if(wr)return;const w=document.getElementById('ww');if(w)w.remove();wr=true;}

function am(text,role,files){
  rw();
  const d=document.createElement('div');d.className='msg '+(role==='user'?'hu':'ai');
  const n=new Date();
  const ts=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  const av=role==='user'?'👤':'🤖';
  const html=role==='user'?text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):rd(text);
  let filesHtml='';
  if(files&&files.length){
    filesHtml='<div class="fchips">';
    files.forEach(f=>{
      const ext=f.original_name.split('.').pop().toLowerCase();
      const cls=f.path.match(/\.(jpg|jpeg|png|gif|webp|svg|bmp)$/i)?'img':f.path.match(/\.(step|stp|igs|iges|stl|obj|fcstd|sldprt|sldasm)$/i)?'cad':f.path.match(/\.(py|js|ts|cpp|c|h|hpp|go|rs|java|sh|bash|yaml|yml|json|xml|toml)$/i)?'code':f.path.match(/\.(pdf|doc|docx|xls|xlsx|ppt|pptx|md|txt|rst)$/i)?'doc':f.path.match(/\.(zip|tar|gz|rar|7z|bz2|xz)$/i)?'archive':f.path.match(/\.(mp4|webm|mp3|wav|ogg|flac|avi|mkv)$/i)?'media':'other';
      const label={img:'IMG',cad:'CAD',code:'<>',doc:'DOC',archive:'ZIP',media:'MED',other:ext.substring(0,3).toUpperCase()}[cls];
      filesHtml+='<div class="fchip"><span class="fi '+cls+'">'+label+'</span><div class="fc"><span class="fn" title="'+f.path+'">'+f.original_name+'</span><span class="fs">'+f.size_human+'</span></div></div>';
    });
    filesHtml+='</div>';
  }
  d.innerHTML='<div class="ava">'+av+'</div><div class="wrap"><div class="bub">'+html+filesHtml+'</div><div class="time">'+ts+'</div></div>';
  mi.appendChild(d);
  if(role==='agent')hc(d);
  document.getElementById('ms').scrollTop=document.getElementById('ms').scrollHeight;
}

function ar(){ti.style.height='auto';ti.style.height=Math.min(ti.scrollHeight,160)+'px';}
ti.addEventListener('input',ar);


/* ===== file upload ===== */
const ubtn = document.getElementById('ubtn'), ufile = document.getElementById('ufile'),
      upbar = document.getElementById('upbar');
let selFiles = [];

function fmtSz(b) {
  for (const u of ['B','KB','MB','GB']) { if (b < 1024) return u === 'B' ? b + ' B' : b.toFixed(1) + ' ' + u; b /= 1024; }
  return b.toFixed(1) + ' TB';
}

function renderUpbar() {
  upbar.innerHTML = '';
  selFiles.forEach((f, i) => {
    const c = document.createElement('div');
    if(f.status==='done')return;
    c.className = 'up-chip' + (f.status === 'err' ? ' err' : '');
    const sz = f.status === 'done' ? '✓' : f.status === 'err' ? '✗' : fmtSz(f.file.size);
    c.innerHTML = '<span class="c-name" title="' + f.file.name + '">' + f.file.name + '</span><span>' + sz + '</span>';
    if (f.status === 'ready') {
      const rm = document.createElement('span');
      rm.className = 'c-rm'; rm.textContent = '×';
      rm.onclick = () => { selFiles.splice(i, 1); renderUpbar(); };
      c.appendChild(rm);
    }
    upbar.appendChild(c);
  });
}

ufile.addEventListener('change', () => {
  for (let f of ufile.files) {
    if (!selFiles.some(sf => sf.file.name === f.name && sf.file.size === f.size)) {
      selFiles.push({ file: f, status: 'ready' });
    }
  }
  ufile.value = '';
  renderUpbar();
});

async function uploadAll() {
  const ready = selFiles.filter(f => f.status === 'ready');
  if (ready.length === 0) return [];
  for (let r of ready) r.status = 'uploading';
  renderUpbar();
  const fd = new FormData();
  ready.forEach(r => fd.append('files', r.file));
  try {
    const resp = await fetch('/upload', { method: 'POST', body: fd });
    const data = await resp.json();
    if (data.success && data.files) {
      data.files.forEach((f, i) => {
        if (f.error) ready[i].status = 'err';
        else { ready[i].status = 'done'; ready[i].info = f; }
      });
    }
  } catch(e) {
    ready.forEach(r => r.status = 'err');
  }
  renderUpbar();
  return selFiles.filter(f => f.status === 'done').map(f => f.info);
}

function clearUploads() {
  selFiles = selFiles.filter(f => f.status !== 'done');
  renderUpbar();
}


async function sm(){
  const t=ti.value.trim();
  const ready = selFiles.filter(f => f.status === 'ready');
  if(!t && ready.length === 0) return;
  // upload files first
  let uploaded = [];
  if(ready.length > 0) {
    stt.textContent = '上传文件中...'; sb.disabled = true;
    uploaded = await uploadAll();
    if(uploaded.length === 0 && !t) { sb.disabled = false; stt.textContent = '上传失败'; return; }
    stt.textContent = '发送中...';
  }
  if(!t) { am('', 'user', uploaded); clearUploads(); sb.disabled = false; stt.textContent = '已上传 ' + uploaded.length + ' 个文件'; return; }
  am(t,'user',uploaded);ti.value='';ar();clearUploads();stt.textContent='发送中...';sb.disabled=true;
  try{
    const r=await fetch('/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t, files:uploaded})});
    const d=await r.json();stt.textContent=d.success?'已发送':'失败: '+(d.error||'?');
  }catch(e){stt.textContent='连接错误';}
  sb.disabled=false;
}
sb.onclick=sm;
ti.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sm();}});

const es=new EventSource('/stream');
es.onmessage=e=>{try{var d=JSON.parse(e.data);am(d.msg,d.role||'agent');}catch(_){am(e.data,'agent');}stt.textContent='已连接';};
es.onerror=()=>{stt.textContent='重连中...';};
</script>
</body>
</html>
