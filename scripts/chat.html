<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>{agent_name}</title>
<style>
:root {
  --bg: #f5f5f7;
  --surface: rgba(255,255,255,0.72);
  --glass: rgba(255,255,255,0.55);
  --glass-border: rgba(0,0,0,0.06);
  --text: #1d1d1f;
  --text-secondary: #86868b;
  --accent: #0071e3;
  --accent-light: rgba(0,113,227,0.08);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
  --radius-sm: 10px;
  --radius: 20px;
  --radius-lg: 24px;
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --font-mono: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'PingFang SC', monospace;
}
.dark {
  --bg: #000000;
  --surface: rgba(28,28,30,0.92);
  --glass: rgba(44,44,46,0.65);
  --glass-border: rgba(255,255,255,0.08);
  --text: #f5f5f7;
  --text-secondary: #98989d;
  --accent: #2997ff;
  --accent-light: rgba(41,151,255,0.12);
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.01em;
}

/* ── Navigation Bar ── */
.nav {
  flex-shrink: 0;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
  background: var(--surface);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--glass-border);
  z-index: 10;
}
.nav-center {
  font-size: 14px;
  font-weight: 590;
  color: var(--text);
  letter-spacing: -0.01em;
}
.nav-right {
  position: absolute;
  right: 20px;
}
.theme-btn {
  width: 32px; height: 32px;
  border: none;
  background: var(--accent-light);
  border-radius: 50%;
  cursor: pointer;
  font-size: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform .2s, background .2s;
  color: var(--text);
}
.theme-btn:hover { transform: scale(1.08); background: var(--glass); }
.theme-btn:active { transform: scale(0.94); }

/* ── Messages ── */
.msgs {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0 32px;
  scroll-behavior: smooth;
}
.msgs-inner {
  max-width: 740px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.msg-row {
  display: flex;
  gap: 10px;
  animation: appear .35s cubic-bezier(0.22, 0.61, 0.36, 1);
}
@keyframes appear {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg-row.user { flex-direction: row-reverse; }
.msg-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.msg-row.user .msg-body { align-items: flex-end; }

.bub {
  font-size: 16px;
  line-height: 1.5;
  max-width: 100%;
}
.msg-row.agent .bub {
  padding: 8px 0;
}
.msg-row.user .bub {
  background: var(--accent);
  color: #ffffff;
  padding: 10px 18px;
  border-radius: 22px;
  max-width: 72%;
}
.msg-row.user .bub code { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.15); }
.msg-row.user .bub a { color: #ffffff; border-bottom-color: rgba(255,255,255,0.5); }

.msg-row.agent .bub p { margin: 6px 0; }
.msg-row.agent .bub p:first-child { margin-top: 0; }
.msg-row.agent .bub p:last-child { margin-bottom: 0; }
.msg-row.user .bub p { margin: 2px 0; }

/* ── Markdown ── */
.bub h1,.bub h2,.bub h3 {
  font-weight: 600;
  margin: 22px 0 10px;
  letter-spacing: -0.02em;
}
.bub h1:first-child,.bub h2:first-child,.bub h3:first-child { margin-top: 0; }
.bub h1 { font-size: 1.6em; }
.bub h2 { font-size: 1.3em; padding-bottom: 6px; border-bottom: 1px solid var(--glass-border); }
.bub h3 { font-size: 1.1em; }
.bub hr { border: none; border-top: 1px solid var(--glass-border); margin: 20px 0; }
.bub code {
  font-family: var(--font-mono);
  font-size: 13px;
  background: var(--accent-light);
  padding: 2px 6px;
  border-radius: 4px;
}
.bub pre {
  background: #f0f0f2;
  border-radius: 14px;
  padding: 18px 20px;
  overflow-x: auto;
  margin: 14px 0;
  white-space: pre-wrap;
  word-break: break-all;
  border: 0.5px solid var(--glass-border);
}
.dark .bub pre { background: #1c1c1e; }
.bub pre code { background: none; padding: 0; font-size: 13px; line-height: 1.55; }
.bub ul,.bub ol { margin: 8px 0; padding-left: 22px; }
.bub li { margin: 4px 0; }
.bub table {
  border-collapse: collapse;
  margin: 12px 0;
  width: 100%;
  font-size: 13px;
  border-radius: 10px;
  overflow: hidden;
  border: 0.5px solid var(--glass-border);
}
.bub th,.bub td { border-bottom: 0.5px solid var(--glass-border); padding: 10px 14px; text-align: left; }
.bub th { background: var(--accent-light); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.03em; }
.bub tr:last-child td { border-bottom: none; }
.bub blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 16px;
  margin: 14px 0;
  color: var(--text-secondary);
}
.bub a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border .15s; }
.bub a:hover { border-bottom-color: var(--accent); }
.bub strong { font-weight: 600; }
.bub img { max-width: 100%; border-radius: 14px; margin: 8px 0; }

/* Code wrap */
.wrap { border-radius: 14px; overflow: hidden; margin: 14px 0; border: 0.5px solid var(--glass-border); }
.cb-banner {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 16px;
  font-size: 11px;
  font-family: var(--font-mono);
  background: rgba(0,0,0,0.03);
  color: var(--text-secondary);
  letter-spacing: 0.02em;
}
.dark .cb-banner { background: rgba(255,255,255,0.03); }
.cb-copy-btn {
  display: inline-flex; align-items: center; cursor: pointer;
  border: none; background: var(--glass);
  font-size: 11px; padding: 5px 12px; border-radius: 14px;
  transition: all .15s; font-family: var(--font);
  color: var(--text-secondary);
}
.cb-copy-btn:hover { background: var(--accent-light); color: var(--accent); }

/* ── Attachments ── */
.attaches { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.attaches .fchip {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px;
  border-radius: 14px;
  background: var(--glass);
  border: 0.5px solid var(--glass-border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  width: 320px; max-width: 100%;
}
.attaches .fc { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; overflow: hidden; }
.attaches .fn { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.attaches .fs { font-size: 11px; color: var(--text-secondary); }

.time {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 3px;
  letter-spacing: 0.01em;
}
.msg-row.user .time { text-align: right; }

/* ── Empty State ── */
.empty-hint {
  text-align: center;
  color: var(--text-secondary);
  margin-top: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.empty-hint .logo {
  width: 56px; height: 56px;
  border-radius: 18px;
  background: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  box-shadow: var(--shadow-sm);
}
.empty-hint .title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
}
.empty-hint .subtitle {
  font-size: 14px;
  max-width: 300px;
  line-height: 1.5;
}

/* ── Input Area ── */
.bottom {
  flex-shrink: 0;
  padding: 0 20px 20px;
  background: linear-gradient(to top, var(--bg) 50%, transparent);
}
.bottom-inner { max-width: 740px; margin: 0 auto; }

.up-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; min-height: 0; }
.up-chip {
  display: flex; align-items: center; gap: 8px;
  background: var(--glass);
  border: 0.5px solid var(--glass-border);
  border-radius: 12px;
  padding: 8px 14px;
  font-size: 12px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.up-chip .c-name { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.up-chip .rm { cursor: pointer; color: var(--text-secondary); font-weight: 500; }
.up-chip .rm:hover { color: #ff3b30; }

.inp-bar {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--surface);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border: 0.5px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 10px 14px;
  transition: all .25s cubic-bezier(0.22, 0.61, 0.36, 1);
  box-shadow: var(--shadow-md);
}
.inp-bar:focus-within {
  box-shadow: var(--shadow-lg), 0 0 0 3px rgba(0,113,227,0.12);
  border-color: rgba(0,113,227,0.2);
}
.dark .inp-bar:focus-within {
  box-shadow: var(--shadow-lg), 0 0 0 3px rgba(41,151,255,0.15);
}

.inp-bar textarea {
  flex: 1;
  border: none;
  background: transparent;
  color: var(--text);
  font-size: 16px;
  line-height: 1.4;
  resize: none;
  outline: none;
  min-height: 132px;
  max-height: 200px;
  font-family: var(--font);
  padding: 8px 0;
  caret-color: var(--accent);
}
.inp-bar textarea::placeholder { color: var(--text-secondary); }

.btn-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  border-radius: 50%;
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  transition: all .2s;
}
.btn-icon:hover { color: var(--accent); background: var(--accent-light); }

.send-btn {
  width: 40px; height: 40px;
  border-radius: 50% !important;
  background: var(--accent) !important;
  color: #ffffff !important;
  box-shadow: 0 2px 12px rgba(0,113,227,0.25);
  transition: all .25s cubic-bezier(0.22, 0.61, 0.36, 1) !important;
}
.send-btn:hover:not(:disabled) {
  transform: scale(1.06);
  box-shadow: 0 4px 20px rgba(0,113,227,0.35);
}
.send-btn:active:not(:disabled) { transform: scale(0.94); }
.send-btn:disabled {
  background: var(--glass) !important;
  box-shadow: none !important;
  color: var(--text-secondary) !important;
  cursor: default;
}
.dark .send-btn:disabled { background: rgba(255,255,255,0.06) !important; }

.status-bar {
  text-align: center;
  font-size: 11px;
  color: var(--text-secondary);
  padding: 8px 0 0;
  letter-spacing: 0.01em;
}

/* ── Scrollbar ── */
.msgs::-webkit-scrollbar { width: 5px; }
.msgs::-webkit-scrollbar-track { background: transparent; }
.msgs::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
.dark .msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }
.msgs::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }
.dark .msgs::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<div class="nav">
  <span class="nav-center">Adam</span>
  <div class="nav-right">
    <button class="theme-btn" onclick="td()" title="外观" id="darkBtn">🌙</button>
  </div>
</div>

<div class="msgs" id="ms"><div class="msgs-inner" id="mi">
  <div class="empty-hint">
    <div class="logo">⚡</div>
    <div class="title">Adam</div>
    <div class="subtitle">Cloud-Soul AI Agent &middot; ROS2 &middot; 云端记忆</div>
  </div>
</div></div>

<div class="bottom">
  <div class="bottom-inner">
    <div class="up-bar" id="ub"></div>
    <div class="inp-bar">
      <textarea id="ti" rows="1" placeholder="消息..."></textarea>
      <button class="btn-icon" id="fb" title="附件">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <button class="btn-icon send-btn" id="sb" title="发送" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
    <div class="status-bar" id="st">就绪</div>
  </div>
</div>

<input type="file" id="ff" multiple style="display:none">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const sb=document.getElementById('sb'),stt=document.getElementById('st'),ti=document.getElementById('ti'),ms=document.getElementById('ms'),mi=document.getElementById('mi'),ub=document.getElementById('ub'),ff=document.getElementById('ff'),fb=document.getElementById('fb');
sb.onclick=sm;

const H_URL=location.pathname.replace(/\/$/,'');
let selFiles=[],_lastSeq=0,_hasSent=false;
marked.setOptions({breaks:true,gfm:true});

const HAS_UA=new Image();HAS_UA.src=H_URL+'/config/avatar/user.png';HAS_UA.onerror=()=>{HAS_UA.ok=0;};HAS_UA.onload=()=>{HAS_UA.ok=1;};
const HAS_AA=new Image();HAS_AA.src=H_URL+'/config/avatar/agent.png';HAS_AA.onerror=()=>{HAS_AA.ok=0;};HAS_AA.onload=()=>{HAS_AA.ok=1;};
function avaHTML(role){const img=role==='user'?HAS_UA:HAS_AA;if(img.ok)return '<div class=\"ava\"><img src=\"'+H_URL+'/config/avatar/'+role+'.png\"></div>';return '';}

function wrapCodeBlocks(el){el.querySelectorAll('.bub pre').forEach(pre=>{if(pre.closest('.wrap'))return;const cl=pre.querySelector('code');const lang=(cl&&cl.className.match(/language-(\w+)/)||[])[1]||'';const wrap=document.createElement('div');wrap.className='wrap';const banner=document.createElement('div');banner.className='cb-banner';const langSpan=document.createElement('span');langSpan.textContent=lang||'code';const copyIcon='<svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-right:4px;flex-shrink:0\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\" ry=\"2\"/><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"/></svg>';
const checkIcon='<svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-right:4px;flex-shrink:0\"><polyline points=\"20 6 9 17 4 12\"/></svg>';
const copyBtn=document.createElement('button');copyBtn.innerHTML=copyIcon+'复制';copyBtn.className='cb-copy-btn';
copyBtn.onclick=()=>{const code=pre.querySelector('code')||pre;navigator.clipboard.writeText(code.textContent).then(()=>{copyBtn.innerHTML=checkIcon+'复制';setTimeout(()=>{copyBtn.innerHTML=copyIcon+'复制';},2000);});};
banner.appendChild(langSpan);banner.appendChild(copyBtn);wrap.appendChild(banner);pre.style.cssText='margin:0!important;border-radius:0 0 14px 14px;padding:18px 20px;white-space:pre-wrap;word-break:break-all';pre.parentNode.insertBefore(wrap,pre);wrap.appendChild(pre);});}
function highlightCode(el){el.querySelectorAll('pre code').forEach(b=>{try{hljs.highlightElement(b)}catch(e){}});wrapCodeBlocks(el);}
function szf(sz){if(sz>=1048576)return(sz/1048576).toFixed(1)+' MB';if(sz>=1024)return(sz/1024).toFixed(1)+' KB';return sz+' B';}

function am(text,role,files){
  const ei=mi.querySelector('.empty-hint');if(ei)ei.remove();
  const row=document.createElement('div');row.className='msg-row '+role;
  if(files&&files.length)text=text.replace(/\n\[附件:.*\]$/,'');
  let html=marked.parse(text||''),filesHtml='';
  if(files&&files.length){files.forEach(f=>{const nm=(f.original_name||f.name||'file').replace(/</g,'&lt;');const sz=f.size_human||szf(f.size||0);filesHtml+='<div class=\"fchip\"><div class=\"fc\"><span class=\"fn\">'+nm+'</span><span class=\"fs\">'+sz+'</span></div></div>';});}
  const ts=new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  row.innerHTML=avaHTML(role)+'<div class=\"msg-body\"><div class=\"bub\">'+html+'</div>'+(filesHtml?'<div class=\"attaches\">'+filesHtml+'</div>':'')+'<div class=\"time\">'+ts+'</div></div>';
  mi.appendChild(row);highlightCode(row);ms.scrollTop=ms.scrollHeight;
}

async function poll(){
  while(true){
    try{const r=await fetch(H_URL+'/poll?after='+_lastSeq);const d=await r.json();
    if(d.messages)d.messages.forEach(m=>{if(m.role==='user'&&_hasSent){_hasSent=false;return;}am(m.msg,m.role,m.files);});
    if(d.last_seq!==undefined)_lastSeq=d.last_seq;}catch(e){}
    await new Promise(r=>setTimeout(r,2000));
  }
}

async function init(){
  try{const r=await fetch(H_URL+'/history');const d=await r.json();if(d.messages)d.messages.forEach(m=>am(m.msg,m.role,m.files));if(d.last_seq!==undefined)_lastSeq=d.last_seq;}catch(e){}
  stt.textContent='就绪';poll();
}
init();

function ar(){const v=ti.value.trim();sb.disabled=!v&&selFiles.filter(f=>f.status==='ready').length===0;ti.style.height='auto';ti.style.height=Math.min(ti.scrollHeight,200)+'px';}
ti.addEventListener('input',ar);
ti.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sm();}if(e.key==='Enter'&&e.shiftKey){e.preventDefault();ti.value+='\n';ar();}});

async function sm(){
  const t=ti.value.trim(),ready=selFiles.filter(f=>f.status==='ready');
  if(!t&&ready.length===0)return;
  if(ready.length>0){stt.textContent='上传文件中…';sb.disabled=true;const ul=await uploadAll();if(!t){_hasSent=true;am('','user',ul);clearUploads();sb.disabled=false;stt.textContent='已上传 '+ul.length+' 个文件';return;}}
  _hasSent=true;const done=selFiles.filter(f=>f.status==='done').map(f=>f.info);
  am(t,'user',done);ti.value='';ar();clearUploads();stt.textContent='发送中…';sb.disabled=true;
  try{const r=await fetch(H_URL+'/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:t,files:done})});const d=await r.json();stt.textContent=d.success?'已发送':'失败: '+(d.error||'?');}catch(e){stt.textContent='连接错误';}
  sb.disabled=false;
}

function renderUpbar(){
  let h='';selFiles.forEach((f,i)=>{const sz=szf(f.file.size);const cls=f.status==='err'?' style=\"color:#ff3b30\"':'';h+='<div class=\"up-chip\"><span class=\"c-name\" title=\"'+f.file.name.replace(/\"/g,'&quot;')+'\">'+f.file.name.replace(/</g,'&lt;')+'</span><span>'+sz+'</span><span class=\"rm\" onclick=\"selFiles.splice('+i+',1);renderUpbar();ar()\">&times;</span></div>';});
  ub.innerHTML=h;
}
async function uploadAll(){
  const ready=selFiles.filter(f=>f.status==='ready');if(!ready.length)return[];
  ready.forEach(r=>r.status='uploading');renderUpbar();const fd=new FormData();ready.forEach(r=>fd.append('files',r.file));
  try{const r=await fetch(H_URL+'/upload',{method:'POST',body:fd});const d=await r.json();if(d.success&&d.files)d.files.forEach((f,i)=>{if(f.error)ready[i].status='err';else{ready[i].status='done';ready[i].info=f;}});}catch(e){ready.forEach(r=>r.status='err');}
  renderUpbar();return selFiles.filter(f=>f.status==='done').map(f=>f.info);
}
function clearUploads(){selFiles=selFiles.filter(f=>f.status!=='done');renderUpbar();}

fb.onclick=()=>ff.click();
ff.onchange=()=>{for(const f of ff.files){if(!selFiles.some(sf=>sf.file.name===f.name&&sf.file.size===f.size))selFiles.push({file:f,status:'ready'});}renderUpbar();ar();ff.value='';};

function td(){document.body.classList.toggle('dark');const d=document.body.classList.contains('dark');document.getElementById('darkBtn').textContent=d?'☀':'🌙';localStorage.setItem('cs-theme-apple',d?'dark':'light');}
(function(){const v=localStorage.getItem('cs-theme-apple');if(v==='dark'){document.body.classList.add('dark');document.getElementById('darkBtn').textContent='☀';}})();
</script>
</body>
