<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{agent_name} Chat</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<style>
/* ========== Catppuccin Theme Variables ========== */
:root, [data-theme="dark"] {
  --bg: #1e1e2e; --bg-soft: #181825; --bg-hover: #313244;
  --surface: #313244; --overlay: #45475a;
  --text: #cdd6f4; --text-muted: #a6adc8; --text-dim: #6c7086;
  --accent: #89b4fa; --accent-hover: #74c7ec; --green: #a6e3a1;
  --red: #f38ba8; --yellow: #f9e2af; --border: #45475a;
  --code-bg: #11111b; --user-bubble: #89b4fa; --user-text: #1e1e2e;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}
[data-theme="light"] {
  --bg: #eff1f5; --bg-soft: #e6e9ef; --bg-hover: #ccd0da;
  --surface: #e6e9ef; --overlay: #ccd0da;
  --text: #4c4f69; --text-muted: #5c5f77; --text-dim: #9ca0b0;
  --accent: #1e66f5; --accent-hover: #7287fd; --green: #40a02b;
  --red: #d20f39; --yellow: #df8e1d; --border: #ccd0da;
  --code-bg: #1a1826; --user-bubble: #1e66f5; --user-text: #eff1f5;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
  transition: background 0.3s, color 0.3s;
}

/* ========== Header ========== */
#header {
  display: flex; align-items: center; gap: 12px; padding: 14px 20px;
  background: var(--bg-soft); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#header .logo { font-size: 24px; }
#header h1 { font-size: 16px; font-weight: 600; }
#header .actions { margin-left: auto; display: flex; gap: 8px; }
#header button {
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--code-bg);
  background: var(--surface); color: var(--text); cursor: pointer;
  font-size: 13px; transition: 0.2s;
}
#header button:hover { background: var(--overlay); }
#theme-toggle { font-size: 18px; padding: 6px 10px; }

/* ========== Messages ========== */
#messages {
  flex: 1; overflow-y: auto; padding: 20px 16px;
  display: flex; flex-direction: column; gap: 20px;
  max-width: 820px; width: 100%; margin: 0 auto;
}
.msg { display: flex; gap: 12px; animation: fadeIn 0.25s ease; }
.msg.agent { align-self: flex-start; flex-direction: row; }
.msg.user  { align-self: flex-end; flex-direction: row-reverse; max-width: 80%; }
.msg .avatar {
  width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.msg.agent .avatar { background: var(--surface); }
.msg.user  .avatar { background: var(--accent); color: var(--user-text); }

.msg .bubble-wrap { display: flex; flex-direction: column; gap: 4px; max-width: 100%; }
.msg .bubble {
  padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px;
  word-break: break-word; position: relative;
}
.msg.agent .bubble { background: var(--surface); border: 1px solid var(--border); }
.msg.user  .bubble { background: var(--user-bubble); color: var(--user-text); }
.msg .time { font-size: 11px; color: var(--text-dim); padding: 0 4px; }
.msg.user .time { text-align: right; }

.welcome { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.welcome .icon { font-size: 52px; margin-bottom: 12px; }
.welcome h2 { font-size: 22px; color: var(--text); margin-bottom: 8px; }

/* ========== Markdown inside bubble ========== */
.bubble p { margin: 4px 0; }
.bubble h1 { font-size: 20px; margin: 16px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.bubble h2 { font-size: 17px; margin: 14px 0 6px; }
.bubble h3 { font-size: 15px; margin: 12px 0 4px; }
.bubble ul, .bubble ol { padding-left: 22px; margin: 6px 0; }
.bubble li { margin: 2px 0; }
.bubble blockquote {
  border-left: 3px solid var(--accent); padding: 6px 14px; margin: 8px 0;
  background: var(--bg-hover); border-radius: 0 8px 8px 0; color: var(--text-muted);
}
.bubble table { border-collapse: collapse; margin: 8px 0; width: 100%; overflow-x: auto; display: block; }
.bubble th, .bubble td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
.bubble th { background: var(--bg-hover); font-weight: 600; }
.bubble hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
.bubble a { color: var(--accent); text-decoration: underline; }
.bubble :not(pre) > code {
  background: var(--bg-hover); color: var(--accent);
  padding: 2px 6px; border-radius: 4px; font-size: 13px;
}

/* Code blocks */
.bubble pre {
  background: var(--code-bg); border-radius: 10px; padding: 16px;
  overflow-x: auto; margin: 10px 0; position: relative;
  border: 1px solid var(--code-bg);
}
.bubble pre code { font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace; font-size: 13px; }
.copy-btn {
  position: absolute; top: 8px; right: 8px; padding: 4px 10px;
  background: var(--overlay); color: var(--text-muted); border: 1px solid var(--code-bg);
  border-radius: 6px; cursor: pointer; font-size: 11px; opacity: 0; transition: 0.2s;
}
.bubble pre:hover .copy-btn { opacity: 1; }
.copy-btn.copied { background: var(--green); color: #111; border-color: var(--green); }

/* ========== Input ========== */
#input-area {
  padding: 14px 16px 18px; flex-shrink: 0;
  background: var(--bg-soft); border-top: 1px solid var(--border);
}
#input-area .wrapper {
  max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end;
}
#input-area textarea {
  flex: 1; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px;
  background: var(--bg); color: var(--text); font-family: inherit; font-size: 14px;
  outline: none; resize: none; min-height: 44px; max-height: 160px;
  line-height: 1.5; transition: border-color 0.2s;
}
#input-area textarea:focus { border-color: var(--accent); }
#send-btn {
  padding: 10px 22px; background: var(--accent); color: var(--bg);
  border: none; border-radius: 12px; cursor: pointer; font-size: 14px;
  font-weight: 600; white-space: nowrap; transition: 0.2s; height: 44px;
}
#send-btn:hover { background: var(--accent-hover); }
#send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#status { font-size: 11px; color: var(--text-dim); text-align: center; padding: 4px; }

#messages::-webkit-scrollbar { width: 6px; }
#messages::-webkit-scrollbar-thumb { background: var(--overlay); border-radius: 3px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div id="header">
  <div class="logo">🤖</div>
  <h1>{agent_name}</h1>
  <div class="actions">
    <button id="theme-toggle" title="切换主题">🌓</button>
  </div>
</div>

<div id="messages">
  <div class="welcome">
    <div class="icon">👋</div>
    <h2>你好，我是 {agent_name}</h2>
    <p>在下方输入消息，开始对话</p>
  </div>
</div>
<div id="status">已连接</div>
<div id="input-area">
  <div class="wrapper">
    <textarea id="msg-input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1" autofocus></textarea>
    <button id="send-btn">发送</button>
  </div>
</div>

<script>
// ========== Theme ==========
const themeToggle = document.getElementById('theme-toggle');
const html = document.documentElement;
const saved = localStorage.getItem('theme') || 'dark';
html.setAttribute('data-theme', saved);
themeToggle.textContent = saved === 'dark' ? '☀️' : '🌙';
themeToggle.addEventListener('click', () => {
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
});

// ========== Markdown ==========
marked.setOptions({ breaks: true, gfm: true });

function renderMD(text) {
  const html = marked.parse(text);
  return html;
}

function highlightCode(el) {
  el.querySelectorAll('pre code').forEach(block => {
    hljs.highlightElement(block);
    // copy button
    const pre = block.parentElement;
    if (pre.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-btn'; btn.textContent = 'Copy';
    btn.onclick = () => {
      navigator.clipboard.writeText(block.textContent).then(() => {
        btn.textContent = 'Copied!'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    };
    pre.appendChild(btn);
  });
}

// ========== Messages ==========
const msgsEl = document.getElementById('messages');
const inputEl = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');
let welcomeRemoved = false;

function removeWelcome() {
  if (welcomeRemoved) return;
  const w = msgsEl.querySelector('.welcome');
  if (w) w.remove();
  welcomeRemoved = true;
}

function addMessage(text, role) {
  removeWelcome();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const now = new Date();
  const ts = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const avatar = role === 'user' ? '👤' : '🤖';

  const html = role === 'user'
    ? text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    : renderMD(text);

  div.innerHTML =
    '<div class="avatar">' + avatar + '</div>' +
    '<div class="bubble-wrap">' +
      '<div class="bubble">' + html + '</div>' +
      '<div class="time">' + ts + '</div>' +
    '</div>';
  msgsEl.appendChild(div);

  if (role === 'agent') highlightCode(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

// ========== Input ==========
function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
}
inputEl.addEventListener('input', autoResize);

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  inputEl.value = '';
  inputEl.style.height = 'auto';
  statusEl.textContent = '发送中...';
  sendBtn.disabled = true;
  try {
    const res = await fetch('/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    statusEl.textContent = data.success ? '已发送' : '失败: ' + (data.error || 'unknown');
  } catch (e) {
    statusEl.textContent = '连接错误';
  }
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ========== SSE ==========
const evtSource = new EventSource('/stream');
evtSource.onmessage = event => { addMessage(event.data, 'agent'); statusEl.textContent = '已连接'; };
evtSource.onerror = () => { statusEl.textContent = '重连中...'; };
</script>
</body>
</html>
