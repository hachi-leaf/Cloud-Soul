<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6C8EBF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3568A6;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="soulGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD54F;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#FFB74D;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#FF8A65;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#FFE082;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:0.5"/>
    </radialGradient>
  </defs>

  <!-- Cloud shape -->
  <g transform="translate(64,68)">
    <ellipse cx="-22" cy="0" rx="20" ry="10" fill="url(#cloudGrad)"/>
    <ellipse cx="22" cy="-2" rx="18" ry="11" fill="url(#cloudGrad)"/>
    <ellipse cx="0" cy="-10" rx="22" ry="14" fill="url(#cloudGrad)"/>
    <ellipse cx="0" cy="4" rx="28" ry="12" fill="url(#cloudGrad)"/>
    <rect x="-28" y="0" width="56" height="12" rx="6" fill="url(#cloudGrad)"/>
  </g>

  <!-- Soul glow ring -->
  <circle cx="64" cy="56" r="32" fill="url(#soulGlow)" opacity="0.6"/>

  <!-- Core spark -->
  <circle cx="64" cy="56" r="10" fill="url(#coreGlow)"/>

  <!-- Inner bright core -->
  <circle cx="64" cy="56" r="4" fill="#FFFFFF" opacity="0.9"/>

  <!-- Subtle connection lines (ROS2 nodes) -->
  <g stroke="#6C8EBF" stroke-width="1" opacity="0.4" fill="none">
    <circle cx="64" cy="56" r="22" stroke-dasharray="4,6"/>
    <line x1="42" y1="56" x2="22" y2="56"/>
    <line x1="86" y1="56" x2="106" y2="56"/>
    <line x1="64" y1="34" x2="64" y2="14"/>
  </g>

  <!-- Small dots on connection lines (I/O nodes) -->
  <circle cx="18" cy="56" r="3" fill="#6C8EBF" opacity="0.6"/>
  <circle cx="110" cy="56" r="3" fill="#6C8EBF" opacity="0.6"/>
  <circle cx="64" cy="10" r="3" fill="#6C8EBF" opacity="0.6"/>
</svg>